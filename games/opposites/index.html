<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opposites Game!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8E7;
    --card: #FFFFFF;
    --primary: #FF6B6B;
    --secondary: #4ECDC4;
    --accent: #FFE66D;
    --purple: #A78BFA;
    --orange: #FB923C;
    --pink: #F472B6;
    --green: #34D399;
    --blue: #60A5FA;
    --text: #2D3436;
    --text-light: #636E72;
    --shadow: 0 8px 30px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Floating background shapes */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.15;
    animation: floaty 8s ease-in-out infinite;
  }
  body::before {
    width: 300px; height: 300px;
    background: var(--primary);
    top: -80px; right: -80px;
  }
  body::after {
    width: 250px; height: 250px;
    background: var(--secondary);
    bottom: -60px; left: -60px;
    animation-delay: -4s;
  }

  @keyframes floaty {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(15px, 20px) scale(1.05); }
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 2.8rem;
    background: linear-gradient(135deg, var(--primary), var(--purple), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 4px;
    animation: titleBounce 0.6s ease-out;
  }

  @keyframes titleBounce {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .header .subtitle {
    font-size: 1rem;
    color: var(--text-light);
    font-weight: 600;
  }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .score-item {
    background: var(--card);
    border-radius: 16px;
    padding: 10px 22px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 1rem;
    border: 2px solid transparent;
    transition: transform 0.2s;
  }

  .score-item.correct { border-color: var(--green); }
  .score-item.wrong { border-color: var(--primary); }
  .score-item.streak { border-color: var(--accent); }

  .score-item .emoji { font-size: 1.3rem; }
  .score-item .num { font-size: 1.3rem; color: var(--text); }

  .score-item.pop {
    animation: scorePop 0.35s ease-out;
  }
  @keyframes scorePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* MODE TOGGLE */
  .mode-toggle {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .toggle-btn {
    background: var(--card);
    border: 2px solid #E2E8F0;
    padding: 10px 24px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s;
    color: var(--text-light);
  }

  .toggle-btn:first-child { border-radius: 14px 0 0 14px; }
  .toggle-btn:last-child { border-radius: 0 14px 14px 0; }

  .toggle-btn.active {
    background: var(--secondary);
    border-color: var(--secondary);
    color: #fff;
    box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
  }

  /* GAME CARD */
  .game-card {
    background: var(--card);
    border-radius: 28px;
    padding: 36px 28px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary), var(--purple));
  }

  .progress-text {
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .prompt-label {
    font-size: 1rem;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .prompt-word {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 3.2rem;
    color: var(--text);
    margin-bottom: 24px;
    animation: wordIn 0.4s ease-out;
    line-height: 1.2;
  }

  @keyframes wordIn {
    0% { transform: translateY(20px) scale(0.9); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* MULTIPLE CHOICE */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  .choice-btn {
    background: var(--bg);
    border: 3px solid #E2E8F0;
    border-radius: 16px;
    padding: 16px 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  .choice-btn:hover {
    transform: translateY(-2px);
    border-color: var(--purple);
    box-shadow: 0 6px 20px rgba(167, 139, 250, 0.2);
  }

  .choice-btn:active { transform: scale(0.97); }

  .choice-btn.correct-answer {
    background: #D1FAE5;
    border-color: var(--green);
    animation: correctShake 0.5s ease-out;
  }

  .choice-btn.wrong-answer {
    background: #FEE2E2;
    border-color: var(--primary);
    animation: wrongShake 0.4s ease-out;
  }

  @keyframes correctShake {
    0% { transform: scale(1); }
    30% { transform: scale(1.08); }
    60% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }

  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* TYPING MODE */
  .type-area {
    max-width: 400px;
    margin: 0 auto;
  }

  .type-input {
    width: 100%;
    padding: 16px 20px;
    border: 3px solid #E2E8F0;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    text-align: center;
    outline: none;
    transition: border-color 0.25s;
    color: var(--text);
    background: var(--bg);
  }

  .type-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 4px rgba(167,139,250,0.15);
  }

  .type-input.correct-input {
    border-color: var(--green);
    background: #D1FAE5;
  }

  .type-input.wrong-input {
    border-color: var(--primary);
    background: #FEE2E2;
    animation: wrongShake 0.4s ease-out;
  }

  .submit-btn {
    margin-top: 14px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 15px rgba(167,139,250,0.3);
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(167,139,250,0.4);
  }

  .hint-text {
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 600;
  }

  /* FEEDBACK */
  .feedback {
    margin-top: 18px;
    font-weight: 800;
    font-size: 1.2rem;
    min-height: 36px;
    transition: opacity 0.3s;
  }

  .feedback.correct-fb { color: var(--green); }
  .feedback.wrong-fb { color: var(--primary); }

  .accepted-answers {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 600;
  }

  /* CELEBRATION PARTICLES */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 1.8rem;
    animation: particleFall 1.2s ease-in forwards;
  }

  @keyframes particleFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(120px) rotate(360deg) scale(0.3); }
  }

  /* END SCREEN */
  .end-screen {
    text-align: center;
    padding: 30px 20px;
  }

  .end-screen .trophy { font-size: 5rem; margin-bottom: 10px; animation: titleBounce 0.6s ease-out; }

  .end-screen h2 {
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 2.2rem;
    color: var(--text);
    margin-bottom: 6px;
  }

  .end-screen .final-score {
    font-size: 1.2rem;
    color: var(--text-light);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .end-screen .stars {
    font-size: 2.5rem;
    margin-bottom: 20px;
  }

  .restart-btn {
    background: linear-gradient(135deg, var(--primary), var(--orange));
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 16px 44px;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 6px 20px rgba(255,107,107,0.3);
  }

  .restart-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 25px rgba(255,107,107,0.4);
  }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .header h1 { font-size: 2rem; }
    .prompt-word { font-size: 2.4rem; }
    .choice-btn { font-size: 1.05rem; padding: 13px 10px; }
    .choices { gap: 8px; }
    .game-card { padding: 28px 18px; }
    .score-bar { gap: 10px; }
    .score-item { padding: 8px 14px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Opposites!</h1>
    <p class="subtitle">Find the opposite word 🎯</p>
  </div>

  <div class="score-bar">
    <div class="score-item correct" id="correctBox">
      <span class="emoji">✅</span>
      <span class="num" id="correctCount">0</span>
    </div>
    <div class="score-item wrong" id="wrongBox">
      <span class="emoji">❌</span>
      <span class="num" id="wrongCount">0</span>
    </div>
    <div class="score-item streak" id="streakBox">
      <span class="emoji">🔥</span>
      <span class="num" id="streakCount">0</span>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="toggle-btn active" id="choiceMode" onclick="setMode('choice')">🖱️ Choose</button>
    <button class="toggle-btn" id="typeMode" onclick="setMode('type')">⌨️ Type</button>
  </div>

  <div class="game-card" id="gameCard">
    <!-- Game content injected here -->
  </div>
</div>

<script>
// ---- WORD DATA ----
const wordPairs = [
  { word: "Big", opposites: ["small", "little"], distractors: ["red", "fun", "round"] },
  { word: "Hot", opposites: ["cold"], distractors: ["red", "wet", "big"] },
  { word: "Happy", opposites: ["sad"], distractors: ["fun", "kind", "nice"] },
  { word: "Up", opposites: ["down"], distractors: ["run", "red", "out"] },
  { word: "Fast", opposites: ["slow"], distractors: ["big", "red", "fun"] },
  { word: "Wet", opposites: ["dry"], distractors: ["hot", "big", "red"] },
  { word: "Day", opposites: ["night"], distractors: ["sun", "hot", "dog"] },
  { word: "Good", opposites: ["bad"], distractors: ["big", "fun", "red"] },
  { word: "Tall", opposites: ["short"], distractors: ["red", "fat", "old"] },
  { word: "Hard", opposites: ["soft", "easy"], distractors: ["red", "big", "old"] },
  { word: "Clean", opposites: ["dirty"], distractors: ["wet", "big", "red"] },
  { word: "Full", opposites: ["empty"], distractors: ["big", "round", "red"] },
  { word: "In", opposites: ["out"], distractors: ["up", "big", "red"] },
  { word: "On", opposites: ["off"], distractors: ["up", "big", "red"] },
  { word: "Old", opposites: ["new", "young"], distractors: ["big", "red", "sad"] },
  { word: "Dark", opposites: ["light"], distractors: ["big", "cold", "red"] },
  { word: "Open", opposites: ["shut", "closed"], distractors: ["big", "red", "old"] },
  { word: "Stop", opposites: ["go"], distractors: ["run", "big", "red"] },
  { word: "Yes", opposites: ["no"], distractors: ["ok", "hi", "go"] },
  { word: "Left", opposites: ["right"], distractors: ["up", "go", "big"] },
  { word: "Top", opposites: ["bottom"], distractors: ["side", "big", "red"] },
  { word: "Push", opposites: ["pull"], distractors: ["run", "sit", "eat"] },
  { word: "Loud", opposites: ["quiet"], distractors: ["big", "fast", "red"] },
  { word: "Sit", opposites: ["stand"], distractors: ["run", "eat", "hop"] },
  { word: "Cry", opposites: ["laugh", "smile"], distractors: ["run", "eat", "sit"] },
  { word: "Win", opposites: ["lose"], distractors: ["run", "play", "eat"] },
  { word: "Give", opposites: ["take"], distractors: ["run", "eat", "sit"] },
  { word: "Love", opposites: ["hate"], distractors: ["like", "run", "eat"] },
  { word: "Come", opposites: ["go"], distractors: ["run", "sit", "eat"] },
  { word: "Boy", opposites: ["girl"], distractors: ["dog", "cat", "man"] },
  { word: "Black", opposites: ["white"], distractors: ["red", "blue", "pink"] },
  { word: "Over", opposites: ["under"], distractors: ["up", "on", "out"] },
  { word: "Near", opposites: ["far"], distractors: ["big", "old", "red"] },
  { word: "Nice", opposites: ["mean"], distractors: ["big", "red", "fun"] },
  { word: "Run", opposites: ["walk"], distractors: ["eat", "sit", "hop"] },
  { word: "Awake", opposites: ["asleep"], distractors: ["happy", "run", "eat"] },
  { word: "Brave", opposites: ["scared"], distractors: ["happy", "fast", "big"] },
  { word: "Front", opposites: ["back"], distractors: ["side", "top", "red"] },
  { word: "High", opposites: ["low"], distractors: ["big", "far", "red"] },
  { word: "Sweet", opposites: ["sour"], distractors: ["red", "hot", "big"] },
];

// ---- AUDIO CONTEXT (sound effects) ----
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrectSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function playWrongSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function playFinishSound() {
  try {
    const ctx = getAudioCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.15);
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.4);
    });
  } catch(e) {}
}

// ---- PARTICLES ----
function spawnParticles(x, y) {
  const emojis = ['⭐', '🎉', '✨', '💫', '🌟', '🥳'];
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    el.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
}

// ---- GAME STATE ----
let mode = 'choice'; // 'choice' or 'type'
let currentIndex = 0;
let correctScore = 0;
let wrongScore = 0;
let streak = 0;
let bestStreak = 0;
let shuffledPairs = [];
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.getElementById('choiceMode').classList.toggle('active', m === 'choice');
  document.getElementById('typeMode').classList.toggle('active', m === 'type');
  if (!answered) renderQuestion();
}

function startGame() {
  shuffledPairs = shuffle(wordPairs);
  currentIndex = 0;
  correctScore = 0;
  wrongScore = 0;
  streak = 0;
  bestStreak = 0;
  updateScores();
  renderQuestion();
}

function updateScores() {
  document.getElementById('correctCount').textContent = correctScore;
  document.getElementById('wrongCount').textContent = wrongScore;
  document.getElementById('streakCount').textContent = streak;
}

function popScore(id) {
  const el = document.getElementById(id);
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function renderQuestion() {
  answered = false;
  const pair = shuffledPairs[currentIndex];
  const card = document.getElementById('gameCard');

  let html = `
    <div class="progress-text">Question ${currentIndex + 1} of ${shuffledPairs.length}</div>
    <div class="prompt-label">What is the opposite of...</div>
    <div class="prompt-word">${pair.word}</div>
  `;

  if (mode === 'choice') {
    // Pick 1 correct answer and 3 distractors (only from this word's own distractor list)
    const correctOne = pair.opposites[Math.floor(Math.random() * pair.opposites.length)];
    const wrongOnes = shuffle(pair.distractors).slice(0, 3);
    const options = shuffle([correctOne, ...wrongOnes]);

    html += `<div class="choices">`;
    options.forEach((opt, i) => {
      html += `<button class="choice-btn" id="opt${i}" onclick="checkChoice(this, '${opt.replace(/'/g, "\\'")}')">${capitalize(opt)}</button>`;
    });
    html += `</div>`;
  } else {
    html += `
      <div class="type-area">
        <input class="type-input" id="typeInput" type="text" placeholder="Type the opposite..." autocomplete="off" autofocus />
        <br>
        <button class="submit-btn" onclick="checkTyped()">Check! ✨</button>
        <div class="hint-text">Any correct opposite counts!</div>
      </div>
    `;
  }

  html += `<div class="feedback" id="feedback"></div>`;
  card.innerHTML = html;

  if (mode === 'type') {
    const input = document.getElementById('typeInput');
    input.focus();
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkTyped();
    });
  }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function checkChoice(btn, chosen) {
  if (answered) return;
  answered = true;
  const pair = shuffledPairs[currentIndex];
  const isCorrect = pair.opposites.some(o => o.toLowerCase() === chosen.toLowerCase());

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct-answer');
    handleCorrect(fb, pair, btn);
  } else {
    btn.classList.add('wrong-answer');
    handleWrong(fb, pair);
    // Highlight a correct one
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (pair.opposites.some(o => o.toLowerCase() === b.textContent.trim().toLowerCase())) {
        setTimeout(() => b.classList.add('correct-answer'), 400);
      }
    });
  }
}

function checkTyped() {
  if (answered) return;
  const input = document.getElementById('typeInput');
  const value = input.value.trim().toLowerCase();
  if (!value) return;

  answered = true;
  const pair = shuffledPairs[currentIndex];
  const isCorrect = pair.opposites.some(o => o.toLowerCase() === value);

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    input.classList.add('correct-input');
    handleCorrect(fb, pair, input);
  } else {
    input.classList.add('wrong-input');
    handleWrong(fb, pair);
  }
}

function handleCorrect(fb, pair, el) {
  correctScore++;
  streak++;
  if (streak > bestStreak) bestStreak = streak;
  updateScores();
  popScore('correctBox');
  popScore('streakBox');
  playCorrectSound();

  const rect = el.getBoundingClientRect();
  spawnParticles(rect.left + rect.width / 2, rect.top);

  const messages = ['Amazing! 🎉', 'You got it! ⭐', 'Super! 🌟', 'Wow! 💫', 'Nailed it! 🥳', 'Brilliant! ✨', 'Yes! 🎯'];
  fb.className = 'feedback correct-fb';
  fb.innerHTML = messages[Math.floor(Math.random() * messages.length)];
  fb.innerHTML += `<div class="accepted-answers">Also accepted: ${pair.opposites.map(capitalize).join(', ')}</div>`;

  setTimeout(nextQuestion, 1800);
}

function handleWrong(fb, pair) {
  wrongScore++;
  streak = 0;
  updateScores();
  popScore('wrongBox');
  popScore('streakBox');
  playWrongSound();

  const messages = ['Not quite!', 'Oops!', 'Try again next time!', 'So close!'];
  fb.className = 'feedback wrong-fb';
  fb.innerHTML = messages[Math.floor(Math.random() * messages.length)];
  fb.innerHTML += `<div class="accepted-answers">Correct answers: ${pair.opposites.map(capitalize).join(', ')}</div>`;

  setTimeout(nextQuestion, 2200);
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffledPairs.length) {
    showEndScreen();
  } else {
    renderQuestion();
  }
}

function showEndScreen() {
  playFinishSound();
  const pct = Math.round((correctScore / shuffledPairs.length) * 100);
  let stars = '';
  if (pct >= 90) stars = '⭐⭐⭐';
  else if (pct >= 70) stars = '⭐⭐';
  else if (pct >= 50) stars = '⭐';
  else stars = '💪';

  let message = '';
  if (pct >= 90) message = 'You\'re an Opposites Champion!';
  else if (pct >= 70) message = 'Great job!';
  else if (pct >= 50) message = 'Good effort!';
  else message = 'Keep practicing!';

  const card = document.getElementById('gameCard');
  card.innerHTML = `
    <div class="end-screen">
      <div class="trophy">🏆</div>
      <h2>${message}</h2>
      <div class="final-score">${correctScore} out of ${shuffledPairs.length} correct (${pct}%)</div>
      <div class="final-score">Best streak: ${bestStreak} 🔥</div>
      <div class="stars">${stars}</div>
      <button class="restart-btn" onclick="startGame()">Play Again! 🔄</button>
    </div>
  `;

  // Big celebration particles
  setTimeout(() => {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => spawnParticles(
        window.innerWidth / 2 + (Math.random() - 0.5) * 200,
        window.innerHeight / 3
      ), i * 200);
    }
  }, 300);
}

// ---- START ----
startGame();
</script>
