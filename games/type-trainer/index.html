<!DOCTYPE html>
<html lang="en" data-theme="colourful-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type Trainer</title>
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="type-trainer" data-page-title="Type Trainer">

  <div id="game-wrapper">
    <!-- HUD bar: score, stage, lives, streak, buttons -->
    <div id="hud" class="hud" aria-label="Game status">
      <div class="hud-item">Score: <span id="hud-score-value" aria-live="polite">0</span></div>
      <div class="hud-item">Stage: <span id="hud-stage-current">1</span>/<span id="hud-stage-total">10</span></div>
      <div class="hud-item" id="hud-lives">Lives: <span id="hud-lives-value" aria-live="polite">&#9829;&#9829;&#9829;</span></div>
      <div class="hud-item hud-streak">Streak: <span id="hud-streak-value" aria-live="polite">0</span></div>
      <button id="keyboard-toggle" class="hud-btn keyboard-toggle-btn" aria-label="Toggle on-screen keyboard" title="Toggle keyboard">
        <span class="hud-btn__icon">&#9000;</span>
        <span class="hud-btn__label">Keyboard</span>
      </button>
      <div class="hud-speed-wrap">
        <button id="speed-btn" class="hud-btn" aria-label="Change difficulty" aria-expanded="false" aria-controls="speed-dropdown">
          <span class="hud-btn__icon">⚡</span>
          <span class="hud-btn__label" id="speed-label">Normal</span>
        </button>
        <div id="speed-dropdown" class="speed-dropdown" hidden>
          <!-- Populated by main.js -->
        </div>
      </div>
      <button id="mute-btn" class="hud-btn mute-btn" aria-label="Mute audio" aria-pressed="false" title="Toggle sound">
        <span class="mute-icon" aria-hidden="true">&#x1F50A;</span>
      </button>
      <button id="pause-btn" class="hud-btn" aria-label="Pause game">⏸</button>
    </div>

    <!-- Stage progress bar -->
    <div id="stage-bar" class="stage-bar">
      <span id="play-stage-label" class="stage-label" aria-live="polite">Home row only</span>
      <div class="stage-track">
        <div id="play-prog-fill" class="stage-fill" style="width: 0%"></div>
      </div>
      <span id="play-prog-pct" class="stage-progress">0/10</span>
    </div>

    <!-- Play mode area -->
    <div id="play-area" class="play-area" hidden>
      <div id="play-canvas-wrap" class="canvas-wrap">
        <canvas id="game-canvas"></canvas>
      </div>
    </div>

    <!-- On-screen keyboard container -->
    <div id="keyboard" class="keyboard-container" aria-hidden="true">
      <!-- Keyboard rendered by js/keyboard.js -->
    </div>

    <!-- Typed buffer display (Play mode) -->
    <div id="typed-row" class="typed-row">
      <span id="typed-display" class="typed-display"></span>
    </div>

    <!-- Overlay container for modal screens -->
    <div id="overlay" class="overlay">
      <!-- Player select, mode select, pause, game over injected here -->
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
