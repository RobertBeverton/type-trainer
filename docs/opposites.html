<!DOCTYPE html>
<html lang="en" data-theme="colourful-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opposites Game!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* shared/tokens.css — Design tokens for Kids Games hub
   Four themes: colourful-light, colourful-dark, clean-light, clean-dark
   Set via data-theme attribute on <html> */

/* === Base Tokens (theme-agnostic) === */
:root {
  /* Typography */
  --font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;

  /* Spacing scale */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;  /* Oversized touch targets for young children */

  /* Border radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Font sizes */
  --text-xs: 11px;   /* Admin/hint text only — not readable by ages 4-5 */
  --text-sm: 13px;   /* Secondary text — not reliable for pre-readers */
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --text-2xl: 30px;
  --text-3xl: 36px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;

  /* === Usage Guide ===
     --bg:         Main page background
     --bg-surface: Elevated surfaces (cards, panels, modals)
     --bg-game:    Game play area (canvas container)
     --bg-overlay: Semi-transparent overlay behind modals

     Accent colours are for backgrounds, borders, and decorative fills.
     NOT safe as text colour on light themes — use --text-primary/secondary.
     On dark themes, all accents pass AA as text.
     Always pair colour feedback with animation/shape cues.

     --text-xs/--text-sm: Not readable by ages 4-5. Use --text-base+ for
     any content young children need to read.
  */

  /* TODO Phase 4: @media (prefers-contrast: more) overrides */

  /* Theme swatch colours — static, not theme-dependent (used by shell.css to preview each theme) */
  --swatch-colourful-light-bg: #FFF8E7;
  --swatch-colourful-light-border: #FF6B6B;
  --swatch-colourful-dark-bg: #1A1520;
  --swatch-colourful-dark-border: #C4A8FF;
  --swatch-clean-light-bg: #FAFAF8;
  --swatch-clean-light-border: #536E7A;
  --swatch-clean-dark-bg: #0E0E1A;
  --swatch-clean-dark-border: #77AAFF;
}

/* === Colourful Light (default for ages 4-8) === */
:root[data-theme="colourful-light"] {
  /* Backgrounds */
  --bg: #FFF8E7;
  --bg-surface: #FFFFFF;
  --bg-game: #FFFFFF;
  --bg-overlay: rgba(255, 248, 231, 0.95);

  /* Text */
  --text-primary: #2D3436;
  --text-secondary: #636E72;
  --text-muted: #6E6E7E;       /* Darkened from #8A8A9A — 4.9:1 on white, 4.6:1 on cream */

  /* Borders */
  --border: #E2E8F0;
  --border-light: #EEEEEA;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);

  /* Accent colours — for backgrounds/borders/decorative use, NOT as text on light bg */
  --accent-primary: #FF6B6B;
  --accent-secondary: #4ECDC4;
  --accent-tertiary: #D4A300;   /* Darkened from #FFE66D — visible on cream (3.8:1) */
  --accent-purple: #A78BFA;
  --accent-warm: #FB923C;
  --accent-pink: #F472B6;
  --accent-blue: #60A5FA;

  /* Feedback */
  --success-bg: #D1FAE5;
  --success-text: #065F46;
  --error-bg: #FEE2E2;
  --error-text: #B91C1C;       /* Darkened from #DC2626 — 5.3:1 on error-bg */
  --warning-bg: #FEF3C7;
  --warning-text: #92400E;

  /* Buttons — MUST be solid colours, not gradients.
     Colourful gradient applied in component CSS via background: linear-gradient() */
  --btn-primary-bg: #7C5FE0;   /* Solid purple — used for border-color, outline, etc. */
  --btn-primary-text: #FFFFFF;  /* 4.8:1 on #7C5FE0 */
  --btn-primary-hover: #6A4FCC;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #2D3436;
  --btn-secondary-border: #E2E8F0;
  --btn-secondary-hover: #F5F5F0;

  /* HUD / Shell bar */
  --hud-bg: #FFFFFF;
  --hud-text: #2D3436;
  --hud-accent: #7C5FE0;       /* Darkened from #A78BFA — 4.6:1 on white */
}

/* === Colourful Dark (ages 4-8, dark preference) === */
:root[data-theme="colourful-dark"] {
  /* Backgrounds */
  --bg: #1A1520;
  --bg-surface: #251E2C;
  --bg-game: #1A1520;
  --bg-overlay: rgba(26, 21, 32, 0.95);

  /* Text */
  --text-primary: #F0ECF4;
  --text-secondary: #BDB4C8;
  --text-muted: #9590A5;       /* Lightened from #8A8098 — 4.8:1 on surface */

  /* Borders */
  --border: #3A3244;
  --border-light: #2E2838;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.35);

  /* Accent colours (brighter for dark bg contrast) — all pass 7:1+ on dark bg */
  --accent-primary: #FF8A8A;
  --accent-secondary: #6EE7D8;
  --accent-tertiary: #F5DC78;   /* Slightly desaturated from #FFE66D — reduces halation */
  --accent-purple: #C4A8FF;
  --accent-warm: #FFB06A;
  --accent-pink: #F9A8D4;
  --accent-blue: #80B4FF;

  /* Feedback */
  --success-bg: rgba(52, 211, 153, 0.15);
  --success-text: #6EE7B7;
  --error-bg: rgba(255, 107, 107, 0.15);
  --error-text: #FF8A8A;
  --warning-bg: rgba(255, 230, 109, 0.15);
  --warning-text: #F5DC78;

  /* Buttons — solid colours only */
  --btn-primary-bg: #C4A8FF;
  --btn-primary-text: #1A1520;
  --btn-primary-hover: #A888EE;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #F0ECF4;
  --btn-secondary-border: #3A3244;
  --btn-secondary-hover: #2E2838;

  /* HUD / Shell bar */
  --hud-bg: #251E2C;
  --hud-text: #F0ECF4;
  --hud-accent: #C4A8FF;
}

/* === Clean Light (default for ages 9+) === */
:root[data-theme="clean-light"] {
  /* Backgrounds */
  --bg: #FAFAF8;
  --bg-surface: #F5F5F0;
  --bg-game: #FFFFFF;
  --bg-overlay: rgba(250, 250, 248, 0.95);

  /* Text */
  --text-primary: #1A1A2E;
  --text-secondary: #4A4A5A;
  --text-muted: #6E6E7E;       /* Darkened from #8A8A9A — 5.0:1 on bg-surface */

  /* Borders */
  --border: #E0E0D8;
  --border-light: #EEEEEA;

  /* Shadows */
  --shadow: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);

  /* Accent colours (muted, restrained) */
  --accent-primary: #536E7A;
  --accent-secondary: #4A8E85;
  --accent-tertiary: #9A7D2E;   /* Darkened from #C4A44A — visible on light bg */
  --accent-purple: #7A6BA0;
  --accent-warm: #B87A4A;
  --accent-pink: #B06090;
  --accent-blue: #4A80B0;

  /* Feedback */
  --success-bg: #D1FAE5;
  --success-text: #065F46;
  --error-bg: #FEE2E2;
  --error-text: #B91C1C;       /* Darkened from #DC2626 — 5.3:1 on error-bg */
  --warning-bg: #FEF3C7;
  --warning-text: #92400E;

  /* Buttons — solid colours */
  --btn-primary-bg: #0B2C44;
  --btn-primary-text: #FFFFFF;
  --btn-primary-hover: #1A4A63;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #0B2C44;
  --btn-secondary-border: #536E7A;
  --btn-secondary-hover: #ECF1F4;

  /* HUD / Shell bar */
  --hud-bg: #F5F5F0;
  --hud-text: #1A1A2E;
  --hud-accent: #536E7A;
}

/* === Clean Dark (ages 9+, dark preference) === */
:root[data-theme="clean-dark"] {
  /* Backgrounds */
  --bg: #0E0E1A;
  --bg-surface: #0F0F2A;
  --bg-game: #0A0A1A;
  --bg-overlay: rgba(5, 5, 20, 0.93);

  /* Text */
  --text-primary: #E8E8F0;
  --text-secondary: #A3A3C2;
  --text-muted: #8585A8;

  /* Borders */
  --border: #1A1A4A;
  --border-light: #1A1A3A;

  /* Shadows */
  --shadow: 0 4px 16px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);

  /* Accent colours */
  --accent-primary: #7AF;
  --accent-secondary: #14B8A6;
  --accent-tertiary: #FBBF24;
  --accent-purple: #A855F7;
  --accent-warm: #F97316;
  --accent-pink: #F472B6;
  --accent-blue: #60A5FA;

  /* Feedback */
  --success-bg: rgba(34, 197, 94, 0.15);
  --success-text: #4ADE80;
  --error-bg: rgba(220, 60, 60, 0.15);
  --error-text: #FF6B6B;
  --warning-bg: rgba(251, 191, 36, 0.15);
  --warning-text: #FBBF24;

  /* Buttons — solid colours */
  --btn-primary-bg: #7AF;
  --btn-primary-text: #0A0A1A;
  --btn-primary-hover: #99BBFF;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #7AF;
  --btn-secondary-border: #7AF;
  --btn-secondary-hover: #1A2A4A;

  /* HUD / Shell bar */
  --hud-bg: #0F0F2A;
  --hud-text: #E8E8F0;   /* near-white text — --hud-accent (#7AF) is for icons/highlights only */
  --hud-accent: #7AF;
}
/* shared/shell.css — Shell bar styles
   Uses kg- prefix on all class names to avoid conflicts with game CSS.
   All colours reference shared design tokens (var(--*)). */

/* === Shell Bar === */
.kg-shell {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: var(--hud-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 0 var(--space-sm);
  z-index: 1000;
  font-family: var(--font-family);
}

/* Body offset — games/hub must add this so content isn't hidden under bar */
body {
  padding-top: 56px;
}

.kg-shell__btn {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs) var(--space-sm);
  min-height: 44px;
  min-width: 44px;
  background: none;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--hud-text);
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  transition: background var(--transition-fast);
  white-space: nowrap;
}

.kg-shell__btn:hover {
  background: var(--border);
}

.kg-shell__btn:focus-visible {
  outline: 2px solid var(--hud-accent);
  outline-offset: 2px;
}

.kg-shell__icon {
  font-size: var(--text-lg);
  line-height: 1;
}

.kg-shell__label {
  font-size: var(--text-sm);
  color: var(--hud-text);
}

.kg-shell__title {
  font-size: var(--text-base);
  font-weight: 800;
  color: var(--hud-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}

.kg-shell__spacer {
  flex: 1;
}

.kg-shell__avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  background: var(--hud-accent);
  color: var(--hud-bg);
  font-weight: 900;
  font-size: var(--text-sm);
}

/* === Games Dropdown === */
.kg-shell__games-wrap {
  position: relative;
}

.kg-games-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-game-link {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  color: var(--text-primary);
  text-decoration: none;
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-game-link:hover {
  background: var(--border);
}

.kg-game-link__icon {
  font-size: var(--text-xl);
}

/* === Theme Dropdown === */
.kg-theme-dropdown {
  position: fixed;
  top: 52px;
  right: var(--space-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-theme-option {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  text-align: left;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-theme-option:hover,
.kg-theme-option.active {
  background: var(--border);
}

.kg-theme-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.kg-theme-swatch--colourful-light { background: var(--swatch-colourful-light-bg); border-color: var(--swatch-colourful-light-border); }
.kg-theme-swatch--colourful-dark  { background: var(--swatch-colourful-dark-bg);  border-color: var(--swatch-colourful-dark-border); }
.kg-theme-swatch--clean-light     { background: var(--swatch-clean-light-bg);     border-color: var(--swatch-clean-light-border); }
.kg-theme-swatch--clean-dark      { background: var(--swatch-clean-dark-bg);      border-color: var(--swatch-clean-dark-border); }

/* === Overlays === */
.kg-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg);
}

.kg-overlay__content {
  background: var(--bg-surface);
  border-radius: var(--radius-2xl);
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  max-height: calc(100vh - var(--space-2xl));
  overflow-y: auto;
}

.kg-overlay__heading {
  font-size: var(--text-xl);
  font-weight: 900;
  color: var(--text-primary);
  margin-bottom: var(--space-lg);
  text-align: center;
}

/* === Player Grid === */
.kg-player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: var(--space-md);
}

.kg-player-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-md) var(--space-sm);
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  cursor: pointer;
  min-height: 44px;
  font-family: var(--font-family);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}

.kg-player-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.kg-player-card--add {
  border-style: dashed;
  color: var(--text-secondary);
}

.kg-player-card__avatar {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--accent-purple);
  color: var(--bg-surface);
  font-size: var(--text-xl);
  font-weight: 900;
}

.kg-player-card--add .kg-player-card__avatar {
  background: var(--border);
  color: var(--text-secondary);
}

.kg-player-card__name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.kg-player-card__bracket {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

/* === Add Player Form === */
.kg-form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  font-family: var(--font-family);
}

.kg-form-input {
  display: block;
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg);
  margin-bottom: var(--space-md);
  box-sizing: border-box;
  min-height: 44px;
  transition: border-color var(--transition-fast);
}

.kg-form-input:focus {
  outline: none;
  border-color: var(--hud-accent);
}

.kg-form-fieldset {
  border: none;
  padding: 0;
  margin: 0 0 var(--space-md) 0;
}

.kg-age-toggle {
  display: flex;
  gap: var(--space-xs);
  margin-bottom: var(--space-md);
}

.kg-age-tab {
  flex: 1;
  padding: var(--space-xs) var(--space-sm);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  background: none;
  cursor: pointer;
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  min-height: 44px;
  transition: all var(--transition-fast);
}

.kg-age-tab.active {
  background: var(--hud-accent);
  border-color: var(--hud-accent);
  color: var(--bg-surface);
}

.kg-form-field {
  margin-bottom: var(--space-sm);
}

.kg-form-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* === Buttons === */
.kg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-xl);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 800;
  cursor: pointer;
  min-height: 48px;
  transition: all var(--transition-fast);
  border: 2px solid transparent;
}

.kg-btn--primary {
  background: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border-color: var(--btn-primary-bg);
  flex: 1;
}

.kg-btn--primary:hover:not(:disabled) {
  background: var(--btn-primary-hover);
  border-color: var(--btn-primary-hover);
}

.kg-btn--primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.kg-btn--secondary {
  background: var(--btn-secondary-bg);
  color: var(--btn-secondary-text);
  border-color: var(--btn-secondary-border);
}

.kg-btn--secondary:hover {
  background: var(--btn-secondary-hover);
}

/* === Birthday nudge banner (Phase 4) === */
.kg-nudge-banner {
  width: 100%;
  margin-bottom: var(--space-sm);
  background: var(--warning-bg);
  border-radius: var(--radius-xl);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-family);
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text-primary);
  box-sizing: border-box;
}

.kg-nudge-banner__dismiss {
  background: none;
  border: none;
  cursor: pointer;
  font-size: var(--text-lg);
  color: var(--text-secondary);
  margin-left: auto;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === Responsive === */
@media (max-width: 400px) {
  .kg-shell__title {
    display: none;
  }
  .kg-shell__label {
    display: none;
  }
  .kg-player-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-family);
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    padding-top: 56px;
  }

  /* Floating background shapes */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.15;
    animation: floaty 8s ease-in-out infinite;
  }
  body::before {
    width: 300px; height: 300px;
    background: var(--accent-primary);
    top: -80px; right: -80px;
  }
  body::after {
    width: 250px; height: 250px;
    background: var(--accent-secondary);
    bottom: -60px; left: -60px;
    animation-delay: -4s;
  }

  .container {

  /* MULTIPLE CHOICE */

  @keyframes particleFall {

  /* END SCREEN */

</style>

<script>
// Read player context from shared shell
const playerCtx = window.KidsGames ? window.KidsGames.player : null;
const ageBracket = playerCtx ? playerCtx.ageBracket : '6-8';

const BRACKET_CONFIG = {
  '4-5': { wordCount: 15, distractorCount: 2, showHint: true },
  '6-8': { wordCount: 20, distractorCount: 3, showHint: true },
  '9-12': { wordCount: 30, distractorCount: 3, showHint: false },
  '13+': { wordCount: 40, distractorCount: 3, showHint: false },
};
const config = BRACKET_CONFIG[ageBracket] || BRACKET_CONFIG['6-8'];

// Load saved data for current player
const savedData = window.KidsGames ? window.KidsGames.loadGameData('opposites') : {};
let lifetimeGames = savedData.gamesPlayed || 0;
let lifetimeBestStreak = savedData.bestStreak || 0;
let lifetimeBestScore = savedData.bestScore || 0;

// ---- WORD DATA ----
const wordPairs = [
  { word: "Big", opposites: ["small", "little"], distractors: ["red", "fun", "round"] },
  { word: "Hot", opposites: ["cold"], distractors: ["red", "wet", "big"] },
  { word: "Happy", opposites: ["sad"], distractors: ["fun", "kind", "nice"] },
  { word: "Up", opposites: ["down"], distractors: ["run", "red", "out"] },
  { word: "Fast", opposites: ["slow"], distractors: ["big", "red", "fun"] },
  { word: "Wet", opposites: ["dry"], distractors: ["hot", "big", "red"] },
  { word: "Day", opposites: ["night"], distractors: ["sun", "hot", "dog"] },
  { word: "Good", opposites: ["bad"], distractors: ["big", "fun", "red"] },
  { word: "Tall", opposites: ["short"], distractors: ["red", "fat", "old"] },
  { word: "Hard", opposites: ["soft", "easy"], distractors: ["red", "big", "old"] },
  { word: "Clean", opposites: ["dirty"], distractors: ["wet", "big", "red"] },
  { word: "Full", opposites: ["empty"], distractors: ["big", "round", "red"] },
  { word: "In", opposites: ["out"], distractors: ["up", "big", "red"] },
  { word: "On", opposites: ["off"], distractors: ["up", "big", "red"] },
  { word: "Old", opposites: ["new", "young"], distractors: ["big", "red", "sad"] },
  { word: "Dark", opposites: ["light"], distractors: ["big", "cold", "red"] },
  { word: "Open", opposites: ["shut", "closed"], distractors: ["big", "red", "old"] },
  { word: "Stop", opposites: ["go"], distractors: ["run", "big", "red"] },
  { word: "Yes", opposites: ["no"], distractors: ["ok", "hi", "go"] },
  { word: "Left", opposites: ["right"], distractors: ["up", "go", "big"] },
  { word: "Top", opposites: ["bottom"], distractors: ["side", "big", "red"] },
  { word: "Push", opposites: ["pull"], distractors: ["run", "sit", "eat"] },
  { word: "Loud", opposites: ["quiet"], distractors: ["big", "fast", "red"] },
  { word: "Sit", opposites: ["stand"], distractors: ["run", "eat", "hop"] },
  { word: "Cry", opposites: ["laugh", "smile"], distractors: ["run", "eat", "sit"] },
  { word: "Win", opposites: ["lose"], distractors: ["run", "play", "eat"] },
  { word: "Give", opposites: ["take"], distractors: ["run", "eat", "sit"] },
  { word: "Love", opposites: ["hate"], distractors: ["like", "run", "eat"] },
  { word: "Come", opposites: ["go"], distractors: ["run", "sit", "eat"] },
  { word: "Boy", opposites: ["girl"], distractors: ["dog", "cat", "man"] },
  { word: "Black", opposites: ["white"], distractors: ["red", "blue", "pink"] },
  { word: "Over", opposites: ["under"], distractors: ["up", "on", "out"] },
  { word: "Near", opposites: ["far"], distractors: ["big", "old", "red"] },
  { word: "Nice", opposites: ["mean"], distractors: ["big", "red", "fun"] },
  { word: "Run", opposites: ["walk"], distractors: ["eat", "sit", "hop"] },
  { word: "Awake", opposites: ["asleep"], distractors: ["happy", "run", "eat"] },
  { word: "Brave", opposites: ["scared"], distractors: ["happy", "fast", "big"] },
  { word: "Front", opposites: ["back"], distractors: ["side", "top", "red"] },
  { word: "High", opposites: ["low"], distractors: ["big", "far", "red"] },
  { word: "Sweet", opposites: ["sour"], distractors: ["red", "hot", "big"] },
];

// ---- AUDIO CONTEXT (sound effects) ----
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrectSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function playWrongSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function playFinishSound() {
  try {
    const ctx = getAudioCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.15);
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.4);
    });
  } catch(e) {}
}

// ---- PARTICLES ----
function spawnParticles(x, y) {
  const emojis = ['⭐', '🎉', '✨', '💫', '🌟', '🥳'];
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    el.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
}

// ---- GAME STATE ----
let mode = 'choice'; // 'choice' or 'type'
let currentIndex = 0;
let correctScore = 0;
let wrongScore = 0;
let streak = 0;
let bestStreak = 0;
let shuffledPairs = [];
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.getElementById('choiceMode').classList.toggle('active', m === 'choice');
  document.getElementById('typeMode').classList.toggle('active', m === 'type');
  if (!answered) renderQuestion();
}

function startGame() {
  shuffledPairs = shuffle(wordPairs).slice(0, config.wordCount);
  currentIndex = 0;
  correctScore = 0;
  wrongScore = 0;
  streak = 0;
  bestStreak = 0;
  updateScores();
  renderQuestion();
}

function updateScores() {
  document.getElementById('correctCount').textContent = correctScore;
  document.getElementById('wrongCount').textContent = wrongScore;
  document.getElementById('streakCount').textContent = streak;
}

function popScore(id) {
  const el = document.getElementById(id);
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function renderQuestion() {
  answered = false;
  const pair = shuffledPairs[currentIndex];
  const card = document.getElementById('gameCard');

  let html = `
    <div class="progress-text">Question ${currentIndex + 1} of ${shuffledPairs.length}</div>
    <div class="prompt-label">What is the opposite of...</div>
    <div class="prompt-word">${pair.word}</div>
  `;

  if (mode === 'choice') {
    // Pick 1 correct answer and 3 distractors (only from this word's own distractor list)
    const correctOne = pair.opposites[Math.floor(Math.random() * pair.opposites.length)];
    const wrongOnes = shuffle(pair.distractors).slice(0, config.distractorCount);
    const options = shuffle([correctOne, ...wrongOnes]);

    html += `<div class="choices">`;
    options.forEach((opt, i) => {
      html += `<button class="choice-btn" id="opt${i}" onclick="checkChoice(this, '${opt.replace(/'/g, "\\'")}')">${capitalize(opt)}</button>`;
    });
    html += `</div>`;
  } else {
    html += `
      <div class="type-area">
        <input class="type-input" id="typeInput" type="text" placeholder="Type the opposite..." autocomplete="off" autofocus />
        <br>
        <button class="submit-btn" onclick="checkTyped()">Check! ✨</button>
      </div>
    `;
    if (mode === 'type' && config.showHint) {
      html += `<div class="hint-text">Any correct opposite counts!</div>`;
    }
  }

  html += `<div class="feedback" id="feedback"></div>`;
  card.innerHTML = html;

  if (mode === 'type') {
    const input = document.getElementById('typeInput');
    input.focus();
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkTyped();
    });
  }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function checkChoice(btn, chosen) {
  if (answered) return;
  answered = true;
  const pair = shuffledPairs[currentIndex];
  const isCorrect = pair.opposites.some(o => o.toLowerCase() === chosen.toLowerCase());

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct-answer');
    handleCorrect(fb, pair, btn);
  } else {
    btn.classList.add('wrong-answer');
    handleWrong(fb, pair);
    // Highlight a correct one
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (pair.opposites.some(o => o.toLowerCase() === b.textContent.trim().toLowerCase())) {
        setTimeout(() => b.classList.add('correct-answer'), 400);
      }
    });
  }
}

function checkTyped() {
  if (answered) return;
  const input = document.getElementById('typeInput');
  const value = input.value.trim().toLowerCase();
  if (!value) return;

  answered = true;
  const pair = shuffledPairs[currentIndex];
  const isCorrect = pair.opposites.some(o => o.toLowerCase() === value);

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    input.classList.add('correct-input');
    handleCorrect(fb, pair, input);
  } else {
    input.classList.add('wrong-input');
    handleWrong(fb, pair);
  }
}

function handleCorrect(fb, pair, el) {
  correctScore++;
  streak++;
  if (streak > bestStreak) bestStreak = streak;
  updateScores();
  popScore('correctBox');
  popScore('streakBox');
  playCorrectSound();

  const rect = el.getBoundingClientRect();
  spawnParticles(rect.left + rect.width / 2, rect.top);

  const messages = ['Amazing! 🎉', 'You got it! ⭐', 'Super! 🌟', 'Wow! 💫', 'Nailed it! 🥳', 'Brilliant! ✨', 'Yes! 🎯'];
  fb.className = 'feedback correct-fb';
  fb.innerHTML = messages[Math.floor(Math.random() * messages.length)];
  fb.innerHTML += `<div class="accepted-answers">Also accepted: ${pair.opposites.map(capitalize).join(', ')}</div>`;

  setTimeout(nextQuestion, 1800);
}

function handleWrong(fb, pair) {
  wrongScore++;
  streak = 0;
  updateScores();
  popScore('wrongBox');
  popScore('streakBox');
  playWrongSound();

  const messages = ['Not quite!', 'Oops!', 'Try again next time!', 'So close!'];
  fb.className = 'feedback wrong-fb';
  fb.innerHTML = messages[Math.floor(Math.random() * messages.length)];
  fb.innerHTML += `<div class="accepted-answers">Correct answers: ${pair.opposites.map(capitalize).join(', ')}</div>`;

  setTimeout(nextQuestion, 2200);
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffledPairs.length) {
    showEndScreen();
  } else {
    renderQuestion();
  }
}

function showEndScreen() {
  // Update and save lifetime stats
  lifetimeGames++;
  if (bestStreak > lifetimeBestStreak) lifetimeBestStreak = bestStreak;
  if (correctScore > lifetimeBestScore) lifetimeBestScore = correctScore;
  if (window.KidsGames) {
    window.KidsGames.saveGameData('opposites', {
      gamesPlayed: lifetimeGames,
      bestStreak: lifetimeBestStreak,
      bestScore: lifetimeBestScore,
      lastPlayed: new Date().toISOString().slice(0, 10),
    });
  }
  playFinishSound();
  const pct = Math.round((correctScore / shuffledPairs.length) * 100);
  let stars = '';
  if (pct >= 90) stars = '⭐⭐⭐';
  else if (pct >= 70) stars = '⭐⭐';
  else if (pct >= 50) stars = '⭐';
  else stars = '💪';

  let message = '';
  if (pct >= 90) message = 'You\'re an Opposites Champion!';
  else if (pct >= 70) message = 'Great job!';
  else if (pct >= 50) message = 'Good effort!';
  else message = 'Keep practicing!';

  const card = document.getElementById('gameCard');
  card.innerHTML = `
    <div class="end-screen">
      <div class="trophy">🏆</div>
      <h2>${message}</h2>
      <div class="final-score">${correctScore} out of ${shuffledPairs.length} correct (${pct}%)</div>
      <div class="final-score">Best streak: ${bestStreak} 🔥</div>
      <div class="stars">${stars}</div>
      <button class="restart-btn" onclick="startGame()">Play Again! 🔄</button>
    </div>
  `;

  if (lifetimeGames > 1) {
    const statsDiv = document.createElement('div');
    statsDiv.className = 'final-score';
    statsDiv.style.cssText = 'margin-top: 8px; opacity: 0.7;';
    statsDiv.textContent = `Personal best: ${lifetimeBestScore} · Best streak: ${lifetimeBestStreak} · Games: ${lifetimeGames}`;
    document.querySelector('.end-screen').appendChild(statsDiv);
  }

  // Big celebration particles
  setTimeout(() => {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => spawnParticles(
        window.innerWidth / 2 + (Math.random() - 0.5) * 200,
        window.innerHeight / 3
      ), i * 200);
    }
  }, 300);
}

// ---- START ----
startGame();

(function() { 'use strict';
// shared/storage.js — Player profiles and namespaced game data
// NOTE: This file is concatenated INSIDE the shell IIFE by the build script.

const STORAGE_PREFIX = 'kidsgames_';
const PLAYERS_KEY = STORAGE_PREFIX + 'players';
const ACTIVE_KEY = STORAGE_PREFIX + 'activePlayer';

function _read(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw === null ? null : JSON.parse(raw);
  } catch (e) {
    console.error('KidsGames: corrupt data for key', key, e);
    return null;
  }
}

function _write(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch (e) {
    console.error('KidsGames: storage write failed', key, e);
    return false;
  }
}

// Sanitise player names: letters/numbers/spaces/hyphens/apostrophes, max 20 chars
function sanitiseName(name) {
  return name.replace(/[^\p{L}\p{N} '\-]/gu, '').trim().slice(0, 20);
}

// Escape HTML to prevent injection when inserting into innerHTML
function escapeHtml(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function getAllPlayers() {
  return _read(PLAYERS_KEY) || {};
}

function getPlayer(name) {
  const players = getAllPlayers();
  return players[name] || null;
}

function createPlayer(name, { dob, manualAge }) {
  name = sanitiseName(name);
  if (!name) return false;
  const players = getAllPlayers();
  if (players[name]) return false; // already exists
  players[name] = {
    name: name,
    dob: dob || null,
    manualAge: dob ? null : (manualAge || null),
    theme: getDefaultTheme(dob, manualAge),
    createdAt: new Date().toISOString().slice(0, 10)
  };
  return _write(PLAYERS_KEY, players);
}

function savePlayer(name, data) {
  const players = getAllPlayers();
  players[name] = { ...players[name], ...data };
  _write(PLAYERS_KEY, players);
}

function deletePlayer(name) {
  const players = getAllPlayers();
  delete players[name];
  _write(PLAYERS_KEY, players);
  // Clean up game-specific data — match exact suffix pattern
  const suffix = '_' + name;
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(STORAGE_PREFIX) && k.endsWith(suffix) && k !== PLAYERS_KEY && k !== ACTIVE_KEY) {
        localStorage.removeItem(k);
      }
    });
  } catch (e) {
    console.error('KidsGames: failed to clean up game data for player', name, e);
  }
}

function getActivePlayer() {
  const name = _read(ACTIVE_KEY);
  return name ? getPlayer(name) : null;
}

function setActivePlayer(name) {
  _write(ACTIVE_KEY, name);
}

function getAgeBracket(player) {
  const age = getAge(player);
  if (age === null) return '6-8'; // fallback
  if (age <= 5) return '4-5';
  if (age <= 8) return '6-8';
  if (age <= 12) return '9-12';
  return '13+';
}

function getAge(player) {
  if (player.dob) {
    const today = new Date();
    const birth = new Date(player.dob);
    let age = today.getFullYear() - birth.getFullYear();
    const monthDiff = today.getMonth() - birth.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
    return age;
  }
  return player.manualAge || null;
}

function getDefaultTheme(dob, manualAge) {
  const age = dob
    ? Math.floor((Date.now() - new Date(dob).getTime()) / 31557600000)
    : manualAge;
  if (age !== null && age <= 8) return 'colourful-light';
  return 'clean-light';
}

// Game-specific data
function loadGameData(gameId) {
  const player = getActivePlayer();
  if (!player) return {};
  return _read(STORAGE_PREFIX + gameId + '_' + player.name) || {};

function saveGameData(gameId, data) {

  if (!player) return;

  function migrateTypeTrainerData() {
    // Only run once

    let oldPlayers;
    try {
      oldPlayers = JSON.parse(localStorage.getItem('players') || 'null');
    } catch (e) {

      localStorage.setItem('kidsgames_migrated_typetrainer', 'true');

    if (!oldPlayers || !oldPlayers.players) {

      return;
    }

    // Migrate each player profile
    Object.entries(oldPlayers.players).forEach(([name, data]) => {
      if (!getPlayer(name)) {
        const theme = data.settings && data.settings.theme ? data.settings.theme : 'clean-light';
        const themeMap = { 'light': 'clean-light', 'dark': 'clean-dark', 'clean-light': 'clean-light', 'clean-dark': 'clean-dark', 'colourful-light': 'colourful-light', 'colourful-dark': 'colourful-dark' };
        createPlayer(name, { dob: null, manualAge: bracketToAge(data.ageBracket) });
        savePlayer(name, { theme: themeMap[theme] || theme });

    });
    document.querySelectorAll('.kg-overlay').forEach(o => {
      scrollObserver.observe(o, { attributes: true, attributeFilter: ['hidden'] });

    // Close dropdowns on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.kg-shell__games-wrap')) {
        document.getElementById('kg-games-dropdown').hidden = true;
        document.getElementById('kg-games-btn').setAttribute('aria-expanded', 'false');
      }
      if (!e.target.closest('#kg-theme-btn') && !e.target.closest('.kg-theme-dropdown')) {
        document.getElementById('kg-theme-dropdown').hidden = true;
        document.getElementById('kg-theme-btn').setAttribute('aria-expanded', 'false');
      }
    });
  }

  // --- Init on DOM ready ---
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initShell);
  } else {
    initShell();
  }

})();
  </script>
</body>
</html>
