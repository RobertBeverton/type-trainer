<!DOCTYPE html>
<html lang="en" data-theme="colourful-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opposites Game!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* shared/tokens.css — Design tokens for Kids Games hub
   Two themes: colourful-light, colourful-dark
   Set via data-theme attribute on <html> */

/* === Base Tokens (theme-agnostic) === */
:root {
  /* Typography */
  --font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;

  /* Spacing scale */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;  /* Oversized touch targets for young children */

  /* Border radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Font sizes */
  --text-xs: 11px;   /* Admin/hint text only — not readable by ages 4-5 */
  --text-sm: 13px;   /* Secondary text — not reliable for pre-readers */
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --text-2xl: 30px;
  --text-3xl: 36px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;

  /* === Usage Guide ===
     --bg:         Main page background
     --bg-surface: Elevated surfaces (cards, panels, modals)
     --bg-game:    Game play area (canvas container)
     --bg-overlay: Semi-transparent overlay behind modals

     Accent colours are for backgrounds, borders, and decorative fills.
     NOT safe as text colour on light themes — use --text-primary/secondary.
     On dark themes, all accents pass AA as text.
     Always pair colour feedback with animation/shape cues.

     --text-xs/--text-sm: Not readable by ages 4-5. Use --text-base+ for
     any content young children need to read.
  */

  /* TODO Phase 4: @media (prefers-contrast: more) overrides */

  /* Theme swatch colours — static, not theme-dependent (used by shell.css to preview each theme) */
  --swatch-colourful-light-bg: #FFF8E7;
  --swatch-colourful-light-border: #FF6B6B;
  --swatch-colourful-dark-bg: #1A1520;
  --swatch-colourful-dark-border: #C4A8FF;
}

/* === Colourful Light === */
:root[data-theme="colourful-light"] {
  /* Backgrounds */
  --bg: #FFF8E7;
  --bg-surface: #FFFFFF;
  --bg-game: #FFFFFF;
  --bg-overlay: rgba(255, 248, 231, 0.95);

  /* Text */
  --text-primary: #2D3436;
  --text-secondary: #636E72;
  --text-muted: #6E6E7E;       /* Darkened from #8A8A9A — 4.9:1 on white, 4.6:1 on cream */

  /* Borders */
  --border: #E2E8F0;
  --border-light: #EEEEEA;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);

  /* Accent colours — for backgrounds/borders/decorative use, NOT as text on light bg */
  --accent-primary: #FF6B6B;
  --accent-secondary: #4ECDC4;
  --accent-tertiary: #D4A300;   /* Darkened from #FFE66D — visible on cream (3.8:1) */
  --accent-purple: #A78BFA;
  --accent-warm: #FB923C;
  --accent-pink: #F472B6;
  --accent-blue: #60A5FA;

  /* Feedback */
  --success-bg: #D1FAE5;
  --success-text: #065F46;
  --error-bg: #FEE2E2;
  --error-text: #B91C1C;       /* Darkened from #DC2626 — 5.3:1 on error-bg */
  --warning-bg: #FEF3C7;
  --warning-text: #92400E;

  /* Buttons — MUST be solid colours, not gradients.
     Colourful gradient applied in component CSS via background: linear-gradient() */
  --btn-primary-bg: #7C5FE0;   /* Solid purple — used for border-color, outline, etc. */
  --btn-primary-text: #FFFFFF;  /* 4.8:1 on #7C5FE0 */
  --btn-primary-hover: #6A4FCC;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #2D3436;
  --btn-secondary-border: #E2E8F0;
  --btn-secondary-hover: #F5F5F0;

  /* HUD / Shell bar */
  --hud-bg: #FFFFFF;
  --hud-text: #2D3436;
  --hud-accent: #7C5FE0;       /* Darkened from #A78BFA — 4.6:1 on white */
}

/* === Colourful Dark === */
:root[data-theme="colourful-dark"] {
  /* Backgrounds */
  --bg: #1A1520;
  --bg-surface: #251E2C;
  --bg-game: #1A1520;
  --bg-overlay: rgba(26, 21, 32, 0.95);

  /* Text */
  --text-primary: #F0ECF4;
  --text-secondary: #BDB4C8;
  --text-muted: #9590A5;       /* Lightened from #8A8098 — 4.8:1 on surface */

  /* Borders */
  --border: #3A3244;
  --border-light: #2E2838;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.35);

  /* Accent colours (brighter for dark bg contrast) — all pass 7:1+ on dark bg */
  --accent-primary: #FF8A8A;
  --accent-secondary: #6EE7D8;
  --accent-tertiary: #F5DC78;   /* Slightly desaturated from #FFE66D — reduces halation */
  --accent-purple: #C4A8FF;
  --accent-warm: #FFB06A;
  --accent-pink: #F9A8D4;
  --accent-blue: #80B4FF;

  /* Feedback */
  --success-bg: rgba(52, 211, 153, 0.15);
  --success-text: #6EE7B7;
  --error-bg: rgba(255, 107, 107, 0.15);
  --error-text: #FF8A8A;
  --warning-bg: rgba(255, 230, 109, 0.15);
  --warning-text: #F5DC78;

  /* Buttons — solid colours only */
  --btn-primary-bg: #C4A8FF;
  --btn-primary-text: #1A1520;
  --btn-primary-hover: #A888EE;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #F0ECF4;
  --btn-secondary-border: #3A3244;
  --btn-secondary-hover: #2E2838;

  /* HUD / Shell bar */
  --hud-bg: #251E2C;
  --hud-text: #F0ECF4;
  --hud-accent: #C4A8FF;
}

/* === Reduced Motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
}
/* shared/shell.css — Shell bar styles
   Uses kg- prefix on all class names to avoid conflicts with game CSS.
   All colours reference shared design tokens (var(--*)). */

/* Enforce [hidden] — author display rules (e.g. display:flex) override the
   user-agent's [hidden]{display:none}, so we must re-apply it explicitly. */
[hidden] { display: none !important; }

/* === Shell Bar === */
.kg-shell {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: var(--hud-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 0 var(--space-sm);
  z-index: 1000;
  font-family: var(--font-family);
}

/* Body offset — games/hub must add this so content isn't hidden under bar */
body {
  padding-top: 56px;
}

.kg-shell__btn {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs) var(--space-sm);
  min-height: 44px;
  min-width: 44px;
  background: none;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--hud-text);
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  transition: background var(--transition-fast);
  white-space: nowrap;
}

.kg-shell__btn:hover {
  background: var(--border);
}

.kg-shell__btn:focus-visible {
  outline: 2px solid var(--hud-accent);
  outline-offset: 2px;
}

.kg-shell__icon {
  font-size: var(--text-lg);
  line-height: 1;
}

.kg-shell__label {
  font-size: var(--text-sm);
  color: var(--hud-text);
}

.kg-shell__title {
  font-size: var(--text-base);
  font-weight: 800;
  color: var(--hud-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}

.kg-shell__spacer {
  flex: 1;
}

.kg-shell__avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  background: var(--hud-accent);
  color: var(--hud-bg);
  font-weight: 900;
  font-size: var(--text-sm);
}

/* === Games Dropdown === */
.kg-shell__games-wrap {
  position: relative;
}

.kg-games-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-game-link {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  color: var(--text-primary);
  text-decoration: none;
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-game-link:hover {
  background: var(--border);
}

.kg-game-link__icon {
  font-size: var(--text-xl);
}

/* === Theme Dropdown === */
.kg-theme-dropdown {
  position: fixed;
  top: 52px;
  right: var(--space-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-theme-option {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  text-align: left;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-theme-option:hover,
.kg-theme-option.active {
  background: var(--border);
}

.kg-theme-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.kg-theme-swatch--colourful-light { background: var(--swatch-colourful-light-bg); border-color: var(--swatch-colourful-light-border); }
.kg-theme-swatch--colourful-dark  { background: var(--swatch-colourful-dark-bg);  border-color: var(--swatch-colourful-dark-border); }

/* === Overlays === */
.kg-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg);
}

.kg-overlay__content {
  background: var(--bg-surface);
  border-radius: var(--radius-2xl);
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  max-height: calc(100vh - var(--space-2xl));
  overflow-y: auto;
}

.kg-overlay__heading {
  font-size: var(--text-xl);
  font-weight: 900;
  color: var(--text-primary);
  margin-bottom: var(--space-lg);
  text-align: center;
}

/* === Player Grid === */
.kg-player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: var(--space-md);
}

.kg-player-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-md) var(--space-sm);
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  cursor: pointer;
  min-height: 44px;
  font-family: var(--font-family);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}

.kg-player-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.kg-player-card--add {
  border-style: dashed;
  color: var(--text-secondary);
}

.kg-player-card__avatar {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--accent-purple);
  color: var(--bg-surface);
  font-size: var(--text-xl);
  font-weight: 900;
}

.kg-player-card--add .kg-player-card__avatar {
  background: var(--border);
  color: var(--text-secondary);
}

.kg-player-card__name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.kg-player-card__bracket {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

/* === Add Player Form === */
.kg-form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  font-family: var(--font-family);
}

.kg-form-input {
  display: block;
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg);
  margin-bottom: var(--space-md);
  box-sizing: border-box;
  min-height: 44px;
  transition: border-color var(--transition-fast);
}

.kg-form-input:focus {
  outline: none;
  border-color: var(--hud-accent);
}

.kg-form-fieldset {
  border: none;
  padding: 0;
  margin: 0 0 var(--space-md) 0;
}

.kg-age-toggle {
  display: flex;
  gap: var(--space-xs);
  margin-bottom: var(--space-md);
}

.kg-age-tab {
  flex: 1;
  padding: var(--space-xs) var(--space-sm);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  background: none;
  cursor: pointer;
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  min-height: 44px;
  transition: all var(--transition-fast);
}

.kg-age-tab.active {
  background: var(--hud-accent);
  border-color: var(--hud-accent);
  color: var(--bg-surface);
}

.kg-form-field {
  margin-bottom: var(--space-sm);
}

.kg-form-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* === Buttons === */
.kg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-xl);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 800;
  cursor: pointer;
  min-height: 48px;
  transition: all var(--transition-fast);
  border: 2px solid transparent;
}

.kg-btn--primary {
  background: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border-color: var(--btn-primary-bg);
  flex: 1;
}

.kg-btn--primary:hover:not(:disabled) {
  background: var(--btn-primary-hover);
  border-color: var(--btn-primary-hover);
}

.kg-btn--primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.kg-btn--secondary {
  background: var(--btn-secondary-bg);
  color: var(--btn-secondary-text);
  border-color: var(--btn-secondary-border);
}

.kg-btn--secondary:hover {
  background: var(--btn-secondary-hover);
}

/* === Birthday nudge banner (Phase 4) === */
.kg-nudge-banner {
  width: 100%;
  margin-bottom: var(--space-sm);
  background: var(--warning-bg);
  border-radius: var(--radius-xl);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-family);
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text-primary);
  box-sizing: border-box;
}

.kg-nudge-banner__dismiss {
  background: none;
  border: none;
  cursor: pointer;
  font-size: var(--text-lg);
  color: var(--text-secondary);
  margin-left: auto;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === Responsive === */
@media (max-width: 400px) {
  .kg-shell__title {
    display: none;
  }
  .kg-shell__label {
    display: none;
  }
  .kg-player-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-family);
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    padding-top: 56px;
  }

  /* Floating background shapes */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.15;
    animation: floaty 8s ease-in-out infinite;
  }
  body::before {
    width: 300px; height: 300px;
    background: var(--accent-primary);
    top: -80px; right: -80px;
  }
  body::after {
    width: 250px; height: 250px;
    background: var(--accent-secondary);
    bottom: -60px; left: -60px;
    animation-delay: -4s;
  }

  @keyframes floaty {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(15px, 20px) scale(1.05); }
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: var(--font-family); font-weight: 900;
    font-size: 2.8rem;
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 4px;
    animation: titleBounce 0.6s ease-out;
  }

  @keyframes titleBounce {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .header .subtitle {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .score-item {
    background: var(--bg-surface);
    border-radius: 16px;
    padding: 10px 22px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 1rem;
    border: 2px solid transparent;
    transition: transform 0.2s;
  }

  .score-item.correct { border-color: var(--success-text); }
  .score-item.wrong { border-color: var(--accent-primary); }
  .score-item.streak { border-color: var(--accent-tertiary); }

  .score-item .emoji { font-size: 1.3rem; }
  .score-item .num { font-size: 1.3rem; color: var(--text-primary); }

  .score-item.pop {
    animation: scorePop 0.35s ease-out;
  }
  @keyframes scorePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* MODE TOGGLE */
  .mode-toggle {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .toggle-btn {
    background: var(--bg-surface);
    border: 2px solid var(--border);
    padding: 10px 24px;
    font-family: var(--font-family);
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.25s;
    color: var(--text-secondary);
  }

  .toggle-btn:first-child { border-radius: 14px 0 0 14px; }
  .toggle-btn:last-child { border-radius: 0 14px 14px 0; }

  .toggle-btn.active {
    background: var(--accent-secondary);
    border-color: var(--accent-secondary);
    color: var(--btn-primary-text);
    box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
  }

  /* GAME CARD */
  .game-card {
    background: var(--bg-surface);
    border-radius: 28px;
    padding: 36px 28px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--accent-primary), var(--accent-tertiary), var(--accent-secondary), var(--accent-purple));
  }

  .progress-text {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .prompt-label {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .prompt-word {
    font-family: var(--font-family); font-weight: 900;
    font-size: 3.2rem;

  }

  }

  /* MULTIPLE CHOICE */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  .choice-btn {
    background: var(--bg);
    border: 3px solid var(--border);
    border-radius: 16px;
    padding: 16px 12px;
    font-family: var(--font-family);
    font-weight: 800;
    font-size: 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-primary);
    position: relative;
    overflow: hidden;
  }

  .choice-btn:hover {
    transform: translateY(-2px);
    border-color: var(--accent-purple);
    box-shadow: 0 6px 20px rgba(167, 139, 250, 0.2);
  }

  .choice-btn:active { transform: scale(0.97); }

  .choice-btn.correct-answer {
    background: var(--success-bg);
    border-color: var(--success-text);
    animation: correctShake 0.5s ease-out;
  }

  .choice-btn.wrong-answer {
    background: var(--error-bg);
    border-color: var(--accent-primary);
    animation: wrongShake 0.4s ease-out;
  }

  @keyframes correctShake {
    0% { transform: scale(1); }
    30% { transform: scale(1.08); }
    60% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }

  @keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* TYPING MODE */
  .type-area {
    max-width: 400px;
    margin: 0 auto;
  }

  .type-input {
    width: 100%;
    padding: 16px 20px;
    border: 3px solid var(--border);
    border-radius: 16px;
    font-family: var(--font-family);
    font-weight: 700;
    font-size: 1.3rem;
    text-align: center;
    outline: none;
    transition: border-color 0.25s;
    color: var(--text-primary);
    background: var(--bg);
  }

  .type-input:focus {
    border-color: var(--accent-purple);
    box-shadow: 0 0 0 4px rgba(167,139,250,0.15);
  }

  .type-input.correct-input {
    border-color: var(--success-text);
    background: var(--success-bg);
  }

  .type-input.wrong-input {
    border-color: var(--accent-primary);
    background: var(--error-bg);
    animation: wrongShake 0.4s ease-out;
  }

  .submit-btn {
    margin-top: 14px;
    background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
    color: var(--btn-primary-text);
    border: none;
    border-radius: 14px;
    padding: 14px 40px;
    font-family: var(--font-family);
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 15px rgba(167,139,250,0.3);
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(167,139,250,0.4);
  }

  .hint-text {
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* FEEDBACK */
  .feedback {
    margin-top: 18px;
    font-weight: 800;
    font-size: 1.2rem;
    min-height: 36px;
    transition: opacity 0.3s;
  }

  .feedback.correct-fb { color: var(--success-text); }
  .feedback.wrong-fb { color: var(--accent-primary); }

  .accepted-answers {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* CELEBRATION PARTICLES */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 1.8rem;
    animation: particleFall 1.2s ease-in forwards;
  }

  @keyframes particleFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(120px) rotate(360deg) scale(0.3); }
  }

  /* END SCREEN */
  .end-screen {
    text-align: center;
    padding: 30px 20px;
  }

  .end-screen .trophy { font-size: 5rem; margin-bottom: 10px; animation: titleBounce 0.6s ease-out; }

  .end-screen h2 {
    font-family: var(--font-family); font-weight: 900;

    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .end-screen .final-score {
    font-size: 1.2rem;
    color: var(--text-secondary);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .end-screen .stars {
    font-size: 2.5rem;
    margin-bottom: 20px;
  }

  .restart-btn {
    background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
    color: var(--btn-primary-text);
    border: none;
    border-radius: 16px;
    padding: 16px 44px;
    font-family: var(--font-family); font-weight: 900;
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 6px 20px rgba(255,107,107,0.3);
  }

  .restart-btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 25px rgba(255,107,107,0.4);
  }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .header h1 { font-size: 2rem; }
    .prompt-word { font-size: 2.4rem; }
    .choice-btn { font-size: 1.05rem; padding: 13px 10px; }
    .choices { gap: 8px; }
    .game-card { padding: 28px 18px; }
    .score-bar { gap: 10px; }
    .score-item { padding: 8px 14px; font-size: 0.9rem; }
  }

// ---- AUDIO CONTEXT (sound effects) ----
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrectSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function playWrongSound() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function playFinishSound() {
  try {
    const ctx = getAudioCtx();
    [523, 659, 784, 1047].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.15);
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.4);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.4);
    });
  } catch(e) {}
}

// ---- PARTICLES ----
function spawnParticles(x, y) {
  const emojis = ['⭐', '🎉', '✨', '💫', '🌟', '🥳'];
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (x + (Math.random() - 0.5) * 80) + 'px';
    el.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
}

// ---- GAME STATE ----
let mode = 'choice'; // 'choice' or 'type'
let currentIndex = 0;
let correctScore = 0;
let wrongScore = 0;
let streak = 0;
let bestStreak = 0;
let shuffledPairs = [];
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.getElementById('choiceMode').classList.toggle('active', m === 'choice');
  document.getElementById('typeMode').classList.toggle('active', m === 'type');
  if (!answered) renderQuestion();
}

function startGame() {
  const allowedDifficulties = config.difficulties || ['easy', 'medium', 'hard'];
  const pool = wordPairs.filter(p => allowedDifficulties.includes(p.difficulty || 'hard'));
  shuffledPairs = shuffle(pool).slice(0, config.wordCount);
  currentIndex = 0;
  correctScore = 0;
  wrongScore = 0;
  streak = 0;
  bestStreak = 0;
  updateScores();
  renderQuestion();
}

function updateScores() {
  document.getElementById('correctCount').textContent = correctScore;
  document.getElementById('wrongCount').textContent = wrongScore;
  document.getElementById('streakCount').textContent = streak;
}

function popScore(id) {
  const el = document.getElementById(id);
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function renderQuestion() {
  answered = false;
  const pair = shuffledPairs[currentIndex];
  const card = document.getElementById('gameCard');

  let html = `
    <div class="progress-text">Question ${currentIndex + 1} of ${shuffledPairs.length}</div>
    <div class="prompt-label">What is the opposite of...</div>
    <div class="prompt-word">${pair.word}</div>
  `;

  if (mode === 'choice') {
    // Pick 1 correct answer and 3 distractors (only from this word's own distractor list)
    const correctOne = pair.opposites[Math.floor(Math.random() * pair.opposites.length)];
    const wrongOnes = shuffle(pair.distractors).slice(0, config.distractorCount);
    const options = shuffle([correctOne, ...wrongOnes]);

    html += `<div class="choices">`;
    options.forEach((opt, i) => {
      html += `<button class="choice-btn" id="opt${i}" onclick="checkChoice(this, '${opt.replace(/'/g, "\\'")}')">${capitalize(opt)}</button>`;
    });
    html += `</div>`;
  } else {
    html += `
      <div class="type-area">
        <input class="type-input" id="typeInput" type="text" placeholder="Type the opposite..." autocomplete="off" autofocus />
        <br>
        <button class="submit-btn" onclick="checkTyped()">Check! ✨</button>
      </div>
    `;
    if (mode === 'type' && config.showHint) {
      html += `<div class="hint-text">Any correct opposite counts!</div>`;
    }
  }

  html += `<div class="feedback" id="feedback"></div>`;
  card.innerHTML = html;

  if (mode === 'type') {
    const input = document.getElementById('typeInput');
    input.focus();
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkTyped();
    });
  }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function checkChoice(btn, chosen) {
  if (answered) return;
  answered = true;
  const pair = shuffledPairs[currentIndex];
  const isCorrect = pair.opposites.some(o => o.toLowerCase() === chosen.toLowerCase());

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct-answer');
    handleCorrect(fb, pair, btn);
  } else {
    btn.classList.add('wrong-answer');
    handleWrong(fb, pair);
    // Highlight a correct one
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (pair.opposites.some(o => o.toLowerCase() === b.textContent.trim().toLowerCase())) {
        setTimeout(() => b.classList.add('correct-answer'), 400);
      }
    });
  }
}

// Reduce a typed word to its base form so tense/plural variants are accepted.
// e.g. "lost" → "lose", "started" → "start", "runs" → "run"
function normalizeTyped(w) {
  const irregulars = {
    lost:'lose', won:'win', went:'go', ran:'run', sat:'sit',
    stood:'stand', came:'come', gave:'give', took:'take', fell:'fall',
    rose:'rise', broke:'break', chose:'choose', froze:'freeze',
    hid:'hide', woke:'wake', sang:'sing', rang:'ring', wept:'weep',
    slept:'sleep', kept:'keep', felt:'feel', heard:'hear', held:'hold',
    led:'lead', met:'meet', paid:'pay', said:'say', sent:'send',
    spent:'spend', taught:'teach', told:'tell', thought:'think',
    brought:'bring', caught:'catch', bought:'buy', fought:'fight',
    found:'find', left:'leave', made:'make', got:'get', built:'build',
    hated:'hate', loved:'love', cried:'cry', tried:'try',
  };
  if (irregulars[w]) return irregulars[w];
  // -ed: walked→walk, stopped→stop, tried→try
  if (w.endsWith('ied') && w.length > 4) return w.slice(0, -3) + 'y';
  if (w.endsWith('ed') && w.length > 4) {
    const s = w.slice(0, -2);
    if (s.length > 2 && s.at(-1) === s.at(-2) && !'aeiou'.includes(s.at(-1)))
      return s.slice(0, -1); // stopped→stop
    return s; // walked→walk
  }
  // -ing: walking→walk, running→run
  if (w.endsWith('ing') && w.length > 5) {
    const s = w.slice(0, -3);
    if (s.length > 2 && s.at(-1) === s.at(-2) && !'aeiou'.includes(s.at(-1)))
      return s.slice(0, -1); // running→run
    return s.length >= 2 ? s : w;
  }
  // -s: loses→lose, runs→run (not: class, grass)
  if (w.endsWith('s') && !w.endsWith('ss') && w.length > 3) return w.slice(0, -1);
  return w;
}

function checkTyped() {
  if (answered) return;
  const input = document.getElementById('typeInput');
  const value = input.value.trim().toLowerCase();
  if (!value) return;

  answered = true;
  const pair = shuffledPairs[currentIndex];
  const normalized = normalizeTyped(value);
  const isCorrect = pair.opposites.some(o => {
    const ov = o.toLowerCase();
    return ov === value || ov === normalized;
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    input.classList.add('correct-input');
    handleCorrect(fb, pair, input);
  } else {
    input.classList.add('wrong-input');
    handleWrong(fb, pair);
  }
}

function handleCorrect(fb, pair, el) {
  correctScore++;
  streak++;
  if (streak > bestStreak) bestStreak = streak;
  updateScores();
  popScore('correctBox');
  popScore('streakBox');
  playCorrectSound();

  const rect = el.getBoundingClientRect();
  spawnParticles(rect.left + rect.width / 2, rect.top);

  const messages = ['Amazing! 🎉', 'You got it! ⭐', 'Super! 🌟', 'Wow! 💫', 'Nailed it! 🥳', 'Brilliant! ✨', 'Yes! 🎯'];
  fb.className = 'feedback correct-fb';
  fb.innerHTML = messages[Math.floor(Math.random() * messages.length)];
  fb.innerHTML += `<div class="accepted-answers">Also accepted: ${pair.opposites.map(capitalize).join(', ')}</div>`;

  setTimeout(nextQuestion, 1800);
}

function handleWrong(fb, pair) {
  wrongScore++;
  streak = 0;
  updateScores();
  popScore('wrongBox');
  popScore('streakBox');
  playWrongSound();

  const messages = ['Not quite!', 'Oops!', 'Try again next time!', 'So close!'];
  fb.className = 'feedback wrong-fb';
  fb.innerHTML = messages[Math.floor(Math.random() * messages.length)];
  fb.innerHTML += `<div class="accepted-answers">Correct answers: ${pair.opposites.map(capitalize).join(', ')}</div>`;

  setTimeout(nextQuestion, 2200);
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffledPairs.length) {
    showEndScreen();
  } else {
    renderQuestion();
  }
}

function showEndScreen() {
  // Update and save lifetime stats
  lifetimeGames++;
  if (bestStreak > lifetimeBestStreak) lifetimeBestStreak = bestStreak;
  if (correctScore > lifetimeBestScore) lifetimeBestScore = correctScore;
  if (window.KidsGames) {
    window.KidsGames.saveGameData('opposites', {
      gamesPlayed: lifetimeGames,
      bestStreak: lifetimeBestStreak,
      bestScore: lifetimeBestScore,
      lastPlayed: new Date().toISOString().slice(0, 10),
    });
  }
  playFinishSound();
  const pct = Math.round((correctScore / shuffledPairs.length) * 100);
  let stars = '';
  if (pct >= 90) stars = '⭐⭐⭐';
  else if (pct >= 70) stars = '⭐⭐';
  else if (pct >= 50) stars = '⭐';
  else stars = '💪';

  let message = '';
  if (pct >= 90) message = 'You\'re an Opposites Champion!';
  else if (pct >= 70) message = 'Great job!';
  else if (pct >= 50) message = 'Good effort!';
  else message = 'Keep practicing!';

  const card = document.getElementById('gameCard');
  card.innerHTML = `
    <div class="end-screen">
      <div class="trophy">🏆</div>
      <h2>${message}</h2>
      <div class="final-score">${correctScore} out of ${shuffledPairs.length} correct (${pct}%)</div>
      <div class="final-score">Best streak: ${bestStreak} 🔥</div>
      <div class="stars">${stars}</div>
      <button class="restart-btn" onclick="startGame()">Play Again! 🔄</button>
    </div>
  `;

  if (lifetimeGames > 1) {

    statsDiv.textContent = `Personal best: ${lifetimeBestScore} · Best streak: ${lifetimeBestStreak} · Games: ${lifetimeGames}`;
    document.querySelector('.end-screen').appendChild(statsDiv);
  }

  // Big celebration particles
  setTimeout(() => {
    for (let i = 0; i < 3; i++) {
      setTimeout(() => spawnParticles(
        window.innerWidth / 2 + (Math.random() - 0.5) * 200,
        window.innerHeight / 3
      ), i * 200);
    }
  }, 300);
}

startGame();

function _read(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw === null ? null : JSON.parse(raw);
  } catch (e) {
    console.error('KidsGames: corrupt data for key', key, e);
    return null;
  }
}

function _write(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch (e) {
    console.error('KidsGames: storage write failed', key, e);
    return false;

  el.textContent = str;
  return el.innerHTML;
}

function getAllPlayers() {
  return _read(PLAYERS_KEY) || {};
}

function getPlayer(name) {
  const players = getAllPlayers();
  return players[name] || null;
}

function createPlayer(name, { dob, manualAge }) {
  name = sanitiseName(name);
  if (!name) return false;

    name: name,
    dob: dob || null,
    manualAge: dob ? null : (manualAge || null),
    theme: getDefaultTheme(),
    createdAt: new Date().toISOString().slice(0, 10)
  };

  return _write(PLAYERS_KEY, players) ? name : false;
}

function savePlayer(name, data) {

}

    });
  }

  // --- Init on DOM ready ---
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initShell);
  } else {
    initShell();
  }

})();
  </script>
