<!DOCTYPE html>
<html lang="en" data-theme="colourful-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* shared/tokens.css — Design tokens for Kids Games hub
   Two themes: colourful-light, colourful-dark
   Set via data-theme attribute on <html> */

/* === Base Tokens (theme-agnostic) === */
:root {
  /* Typography */
  --font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;

  /* Spacing scale */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;  /* Oversized touch targets for young children */

  /* Border radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Font sizes */
  --text-xs: 11px;   /* Admin/hint text only — not readable by ages 4-5 */
  --text-sm: 13px;   /* Secondary text — not reliable for pre-readers */
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --text-2xl: 30px;
  --text-3xl: 36px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;

  /* === Usage Guide ===
     --bg:         Main page background
     --bg-surface: Elevated surfaces (cards, panels, modals)
     --bg-game:    Game play area (canvas container)
     --bg-overlay: Semi-transparent overlay behind modals

     Accent colours are for backgrounds, borders, and decorative fills.
     NOT safe as text colour on light themes — use --text-primary/secondary.
     On dark themes, all accents pass AA as text.
     Always pair colour feedback with animation/shape cues.

     --text-xs/--text-sm: Not readable by ages 4-5. Use --text-base+ for
     any content young children need to read.
  */

  /* TODO Phase 4: @media (prefers-contrast: more) overrides */

  /* Theme swatch colours — static, not theme-dependent (used by shell.css to preview each theme) */
  --swatch-colourful-light-bg: #FFF8E7;
  --swatch-colourful-light-border: #FF6B6B;
  --swatch-colourful-dark-bg: #1A1520;
  --swatch-colourful-dark-border: #C4A8FF;
}

/* === Colourful Light === */
:root[data-theme="colourful-light"] {
  /* Backgrounds */
  --bg: #FFF8E7;
  --bg-surface: #FFFFFF;
  --bg-game: #FFFFFF;
  --bg-overlay: rgba(255, 248, 231, 0.95);

  /* Text */
  --text-primary: #2D3436;
  --text-secondary: #636E72;
  --text-muted: #6E6E7E;       /* Darkened from #8A8A9A — 4.9:1 on white, 4.6:1 on cream */

  /* Borders */
  --border: #E2E8F0;
  --border-light: #EEEEEA;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);

  /* Accent colours — for backgrounds/borders/decorative use, NOT as text on light bg */
  --accent-primary: #FF6B6B;
  --accent-secondary: #4ECDC4;
  --accent-tertiary: #D4A300;   /* Darkened from #FFE66D — visible on cream (3.8:1) */
  --accent-purple: #A78BFA;
  --accent-warm: #FB923C;
  --accent-pink: #F472B6;
  --accent-blue: #60A5FA;

  /* Feedback */
  --success-bg: #D1FAE5;
  --success-text: #065F46;
  --error-bg: #FEE2E2;
  --error-text: #B91C1C;       /* Darkened from #DC2626 — 5.3:1 on error-bg */
  --warning-bg: #FEF3C7;
  --warning-text: #92400E;

  /* Buttons — MUST be solid colours, not gradients.
     Colourful gradient applied in component CSS via background: linear-gradient() */
  --btn-primary-bg: #7C5FE0;   /* Solid purple — used for border-color, outline, etc. */
  --btn-primary-text: #FFFFFF;  /* 4.8:1 on #7C5FE0 */
  --btn-primary-hover: #6A4FCC;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #2D3436;
  --btn-secondary-border: #E2E8F0;
  --btn-secondary-hover: #F5F5F0;

  /* HUD / Shell bar */
  --hud-bg: #FFFFFF;
  --hud-text: #2D3436;
  --hud-accent: #7C5FE0;       /* Darkened from #A78BFA — 4.6:1 on white */
}

/* === Colourful Dark === */
:root[data-theme="colourful-dark"] {
  /* Backgrounds */
  --bg: #1A1520;
  --bg-surface: #251E2C;
  --bg-game: #1A1520;
  --bg-overlay: rgba(26, 21, 32, 0.95);

  /* Text */
  --text-primary: #F0ECF4;
  --text-secondary: #BDB4C8;
  --text-muted: #9590A5;       /* Lightened from #8A8098 — 4.8:1 on surface */

  /* Borders */
  --border: #3A3244;
  --border-light: #2E2838;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.35);

  /* Accent colours (brighter for dark bg contrast) — all pass 7:1+ on dark bg */
  --accent-primary: #FF8A8A;
  --accent-secondary: #6EE7D8;
  --accent-tertiary: #F5DC78;   /* Slightly desaturated from #FFE66D — reduces halation */
  --accent-purple: #C4A8FF;
  --accent-warm: #FFB06A;
  --accent-pink: #F9A8D4;
  --accent-blue: #80B4FF;

  /* Feedback */
  --success-bg: rgba(52, 211, 153, 0.15);
  --success-text: #6EE7B7;
  --error-bg: rgba(255, 107, 107, 0.15);
  --error-text: #FF8A8A;
  --warning-bg: rgba(255, 230, 109, 0.15);
  --warning-text: #F5DC78;

  /* Buttons — solid colours only */
  --btn-primary-bg: #C4A8FF;
  --btn-primary-text: #1A1520;
  --btn-primary-hover: #A888EE;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #F0ECF4;
  --btn-secondary-border: #3A3244;
  --btn-secondary-hover: #2E2838;

  /* HUD / Shell bar */
  --hud-bg: #251E2C;
  --hud-text: #F0ECF4;
  --hud-accent: #C4A8FF;
}

/* === Reduced Motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
}
/* shared/shell.css — Shell bar styles
   Uses kg- prefix on all class names to avoid conflicts with game CSS.
   All colours reference shared design tokens (var(--*)). */

/* Enforce [hidden] — author display rules (e.g. display:flex) override the
   user-agent's [hidden]{display:none}, so we must re-apply it explicitly. */
[hidden] { display: none !important; }

/* === Shell Bar === */
.kg-shell {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: var(--hud-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 0 var(--space-sm);
  z-index: 1000;
  font-family: var(--font-family);
}

/* Body offset — games/hub must add this so content isn't hidden under bar */
body {
  padding-top: 56px;
}

.kg-shell__btn {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs) var(--space-sm);
  min-height: 44px;
  min-width: 44px;
  background: none;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--hud-text);
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  transition: background var(--transition-fast);
  white-space: nowrap;
}

.kg-shell__btn:hover {
  background: var(--border);
}

.kg-shell__btn:focus-visible {
  outline: 2px solid var(--hud-accent);
  outline-offset: 2px;
}

.kg-shell__icon {
  font-size: var(--text-lg);
  line-height: 1;
}

.kg-shell__label {
  font-size: var(--text-sm);
  color: var(--hud-text);
}

.kg-shell__title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: var(--text-lg);
  font-weight: 900;
  color: var(--hud-text);
  white-space: nowrap;
  pointer-events: auto;
}

.kg-shell__home {
  text-decoration: none;
  border-radius: var(--radius-md);
  padding: 2px 8px;
  transition: background var(--transition-fast);
}

.kg-shell__home:hover {
  background: var(--border);
}

.kg-shell__spacer {
  flex: 1;
}

.kg-shell__version {
  font-size: 10px;
  font-family: var(--font-family);
  color: var(--hud-text);
  opacity: 0.35;
  white-space: nowrap;
  user-select: none;
}

.kg-shell__avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  background: var(--hud-accent);
  color: var(--hud-bg);
  font-weight: 900;
  font-size: var(--text-sm);
}

/* === Games Dropdown === */
.kg-shell__games-wrap {
  position: relative;
}

.kg-games-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-game-link {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  color: var(--text-primary);
  text-decoration: none;
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-game-link:hover {
  background: var(--border);
}

.kg-game-link__icon {
  font-size: var(--text-xl);
}

/* === Theme Dropdown === */
.kg-theme-dropdown {
  position: fixed;
  top: 52px;
  right: var(--space-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-theme-option {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  text-align: left;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-theme-option:hover,
.kg-theme-option.active {
  background: var(--border);
}

.kg-theme-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.kg-theme-swatch--colourful-light { background: var(--swatch-colourful-light-bg); border-color: var(--swatch-colourful-light-border); }
.kg-theme-swatch--colourful-dark  { background: var(--swatch-colourful-dark-bg);  border-color: var(--swatch-colourful-dark-border); }

/* === Overlays === */
.kg-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg);
}

.kg-overlay__content {
  background: var(--bg-surface);
  border-radius: var(--radius-2xl);
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  max-height: calc(100vh - var(--space-2xl));
  overflow-y: auto;
}

.kg-overlay__heading {
  font-size: var(--text-xl);
  font-weight: 900;
  color: var(--text-primary);
  margin-bottom: var(--space-lg);
  text-align: center;
}

/* === Player Grid === */
.kg-player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: var(--space-md);
}

.kg-player-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-md) var(--space-sm);
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  cursor: pointer;
  min-height: 44px;
  font-family: var(--font-family);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}

.kg-player-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.kg-player-card--add {
  border-style: dashed;
  color: var(--text-secondary);
}

.kg-player-card__avatar {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--accent-purple);
  color: var(--bg-surface);
  font-size: var(--text-xl);
  font-weight: 900;
}

.kg-player-card--add .kg-player-card__avatar {
  background: var(--border);
  color: var(--text-secondary);
}

.kg-player-card__name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.kg-player-card__bracket {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

/* === Add Player Form === */
.kg-form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  font-family: var(--font-family);
}

.kg-form-input {
  display: block;
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg);
  margin-bottom: var(--space-md);
  box-sizing: border-box;
  min-height: 44px;
  transition: border-color var(--transition-fast);
}

.kg-form-input:focus {
  outline: none;
  border-color: var(--hud-accent);
}

.kg-form-fieldset {
  border: none;
  padding: 0;
  margin: 0 0 var(--space-md) 0;
}

.kg-age-toggle {
  display: flex;
  gap: var(--space-xs);
  margin-bottom: var(--space-md);
}

.kg-age-tab {
  flex: 1;
  padding: var(--space-xs) var(--space-sm);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  background: none;
  cursor: pointer;
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  min-height: 44px;
  transition: all var(--transition-fast);
}

.kg-age-tab.active {
  background: var(--hud-accent);
  border-color: var(--hud-accent);
  color: var(--bg-surface);
}

.kg-form-field {
  margin-bottom: var(--space-sm);
}

.kg-form-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* === Buttons === */
.kg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-xl);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 800;
  cursor: pointer;
  min-height: 48px;
  transition: all var(--transition-fast);
  border: 2px solid transparent;
}

.kg-btn--primary {
  background: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border-color: var(--btn-primary-bg);
  flex: 1;
}

.kg-btn--primary:hover:not(:disabled) {
  background: var(--btn-primary-hover);
  border-color: var(--btn-primary-hover);
}

.kg-btn--primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.kg-btn--secondary {
  background: var(--btn-secondary-bg);
  color: var(--btn-secondary-text);
  border-color: var(--btn-secondary-border);
}

.kg-btn--secondary:hover {
  background: var(--btn-secondary-hover);
}

/* === Birthday nudge banner (Phase 4) === */
.kg-nudge-banner {
  width: 100%;
  margin-bottom: var(--space-sm);
  background: var(--warning-bg);
  border-radius: var(--radius-xl);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-family);
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text-primary);
  box-sizing: border-box;
}

.kg-nudge-banner__dismiss {
  background: none;
  border: none;
  cursor: pointer;
  font-size: var(--text-lg);
  color: var(--text-secondary);
  margin-left: auto;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === Responsive === */
@media (max-width: 540px) {
  .kg-shell__label {
    display: none;
  }
  .kg-shell__version {
    display: none;
  }
}

@media (max-width: 400px) {
  .kg-shell__title {
    display: none;
  }
  .kg-player-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-family);
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    padding-top: 56px;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.15;
    animation: floaty 8s ease-in-out infinite;
  }
  body::before {
    width: 300px; height: 300px;
    background: var(--accent-blue);
    top: -80px; right: -80px;
  }
  body::after {
    width: 250px; height: 250px;
    background: var(--accent-purple);
    bottom: -60px; left: -60px;
    animation-delay: -4s;
  }

  @keyframes floaty {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(15px, 20px) scale(1.05); }
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .game-icon {
    font-size: 5rem;
    display: block;
    margin-bottom: 16px;
    animation: titleBounce 0.6s ease-out;
  }

  @keyframes titleBounce {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  h1 {
    font-weight: 900;
    font-size: 2.8rem;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-tertiary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .desc {
    font-size: 1.1rem;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .coming-soon {
    display: inline-block;
    background: var(--bg-surface);
    border-radius: var(--radius-2xl);
    padding: 32px 48px;
    box-shadow: var(--shadow);
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text-secondary);
  }

  .coming-soon span {
    display: block;
    font-size: 2rem;
    margin-bottom: 8px;
  }
</style>
</head>
<body data-page="memory-match">
<!-- Kids Games Shell Bar -->
<div id="kg-shell" class="kg-shell" role="banner">
  <!-- Games dropdown -->
  <div class="kg-shell__games-wrap">
    <button id="kg-games-btn" class="kg-shell__btn kg-shell__games-btn" aria-expanded="false" aria-controls="kg-games-dropdown">
      <span class="kg-shell__icon" aria-hidden="true">🎮</span>
      <span class="kg-shell__label">Games</span>
    </button>
    <div id="kg-games-dropdown" class="kg-games-dropdown" hidden>
      <!-- Populated by shell.js -->
    </div>
  </div>

  <!-- Page title — links home -->
  <a id="kg-page-title" class="kg-shell__title kg-shell__home" href="/kids-games/">Kids Games</a>

  <!-- Spacer -->
  <span class="kg-shell__spacer"></span>

  <!-- Player -->
  <button id="kg-player-btn" class="kg-shell__btn kg-shell__player-btn" aria-label="Switch player">
    <span id="kg-player-avatar" class="kg-shell__avatar">?</span>
    <span id="kg-player-name" class="kg-shell__label">Guest</span>
  </button>

  <!-- Theme picker -->
  <button id="kg-theme-btn" class="kg-shell__btn" aria-label="Change theme" aria-expanded="false" aria-controls="kg-theme-dropdown" title="Theme">
    <span id="kg-theme-icon" class="kg-shell__icon" aria-hidden="true">🎨</span>
  </button>

  <!-- Volume -->
  <button id="kg-volume-btn" class="kg-shell__btn" aria-label="Toggle sound" aria-pressed="false" title="Sound">
    <span id="kg-volume-icon" class="kg-shell__icon" aria-hidden="true">🔊</span>
  </button>

  <!-- Build version — injected by build.sh -->
  <span class="kg-shell__version" title="Build version">0237b15 25 Mar 13:07</span>
</div>

<!-- Player select overlay -->
<div id="kg-player-overlay" class="kg-overlay" hidden>
  <div class="kg-overlay__content kg-player-select" role="dialog" aria-labelledby="kg-player-heading">
    <h2 id="kg-player-heading" class="kg-overlay__heading">Who's playing?</h2>
    <div id="kg-player-grid" class="kg-player-grid">
      <!-- Player cards + "Add player" card populated by shell.js -->
    </div>
  </div>
</div>

<!-- Add player overlay -->
<div id="kg-addplayer-overlay" class="kg-overlay" hidden>
  <div class="kg-overlay__content kg-addplayer-form" role="dialog" aria-labelledby="kg-addplayer-heading">
    <h2 id="kg-addplayer-heading" class="kg-overlay__heading">New Player</h2>
    <form id="kg-addplayer-form">
      <label class="kg-form-label" for="kg-name-input">Name</label>
      <input id="kg-name-input" class="kg-form-input" type="text" maxlength="20" autocomplete="off" placeholder="Your name" required>

      <fieldset class="kg-form-fieldset">
        <legend class="kg-form-label">How old are you? (optional)</legend>
        <div class="kg-age-toggle" role="tablist">
          <button type="button" class="kg-age-tab active" data-mode="dob" role="tab" aria-selected="true">Date of birth</button>
          <button type="button" class="kg-age-tab" data-mode="age" role="tab" aria-selected="false">Age number</button>
        </div>

        <div id="kg-dob-field" class="kg-form-field" role="tabpanel">
          <label class="kg-form-label" for="kg-dob-input">Date of birth</label>
          <input id="kg-dob-input" class="kg-form-input" type="date">
        </div>

        <div id="kg-age-field" class="kg-form-field" role="tabpanel" hidden>
          <label class="kg-form-label" for="kg-age-input">Age</label>
          <input id="kg-age-input" class="kg-form-input" type="number" min="3" max="99">
        </div>
      </fieldset>

      <div class="kg-form-actions">
        <button type="submit" class="kg-btn kg-btn--primary" id="kg-addplayer-submit" disabled>Let's go!</button>
        <button type="button" class="kg-btn kg-btn--secondary" id="kg-addplayer-cancel">Back</button>
      </div>
    </form>
  </div>
</div>

<!-- Theme picker dropdown -->
<div id="kg-theme-dropdown" class="kg-theme-dropdown" hidden>
  <button class="kg-theme-option" data-theme="colourful-light">
    <span class="kg-theme-swatch kg-theme-swatch--colourful-light"></span>
    Light
  </button>
  <button class="kg-theme-option" data-theme="colourful-dark">
    <span class="kg-theme-swatch kg-theme-swatch--colourful-dark"></span>
    Dark
  </button>
</div>

<div class="container">
  <div class="game-icon">🃏</div>
  <h1>Memory Match</h1>
  <p class="desc">Flip cards and find the matching pairs — how good is your memory?</p>
  <div class="coming-soon">
    <span>🚧</span>
    Coming soon
  </div>
</div>

</body>
</html>
