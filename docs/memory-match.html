<!DOCTYPE html>
<html lang="en" data-theme="colourful-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* shared/tokens.css — Design tokens for Kids Games hub
   Two themes: colourful-light, colourful-dark
   Set via data-theme attribute on <html> */

/* === Base Tokens (theme-agnostic) === */
:root {
  /* Typography */
  --font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;

  /* Spacing scale */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;  /* Oversized touch targets for young children */

  /* Border radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Font sizes */
  --text-xs: 11px;   /* Admin/hint text only — not readable by ages 4-5 */
  --text-sm: 13px;   /* Secondary text — not reliable for pre-readers */
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --text-2xl: 30px;
  --text-3xl: 36px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;

  /* === Usage Guide ===
     --bg:         Main page background
     --bg-surface: Elevated surfaces (cards, panels, modals)
     --bg-game:    Game play area (canvas container)
     --bg-overlay: Semi-transparent overlay behind modals

     Accent colours are for backgrounds, borders, and decorative fills.
     NOT safe as text colour on light themes — use --text-primary/secondary.
     On dark themes, all accents pass AA as text.
     Always pair colour feedback with animation/shape cues.

     --text-xs/--text-sm: Not readable by ages 4-5. Use --text-base+ for
     any content young children need to read.
  */

  /* TODO Phase 4: @media (prefers-contrast: more) overrides */

  /* Theme swatch colours — static, not theme-dependent (used by shell.css to preview each theme) */
  --swatch-colourful-light-bg: #FFF8E7;
  --swatch-colourful-light-border: #FF6B6B;
  --swatch-colourful-dark-bg: #1A1520;
  --swatch-colourful-dark-border: #C4A8FF;
}

/* === Colourful Light === */
:root[data-theme="colourful-light"] {
  /* Backgrounds */
  --bg: #FFF8E7;
  --bg-surface: #FFFFFF;
  --bg-game: #FFFFFF;
  --bg-overlay: rgba(255, 248, 231, 0.95);

  /* Text */
  --text-primary: #2D3436;
  --text-secondary: #636E72;
  --text-muted: #6E6E7E;       /* Darkened from #8A8A9A — 4.9:1 on white, 4.6:1 on cream */

  /* Borders */
  --border: #E2E8F0;
  --border-light: #EEEEEA;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);

  /* Accent colours — for backgrounds/borders/decorative use, NOT as text on light bg */
  --accent-primary: #FF6B6B;
  --accent-secondary: #4ECDC4;
  --accent-tertiary: #D4A300;   /* Darkened from #FFE66D — visible on cream (3.8:1) */
  --accent-purple: #A78BFA;
  --accent-warm: #FB923C;
  --accent-pink: #F472B6;
  --accent-blue: #60A5FA;

  /* Feedback */
  --success-bg: #D1FAE5;
  --success-text: #065F46;
  --error-bg: #FEE2E2;
  --error-text: #B91C1C;       /* Darkened from #DC2626 — 5.3:1 on error-bg */
  --warning-bg: #FEF3C7;
  --warning-text: #92400E;

  /* Buttons — MUST be solid colours, not gradients.
     Colourful gradient applied in component CSS via background: linear-gradient() */
  --btn-primary-bg: #7C5FE0;   /* Solid purple — used for border-color, outline, etc. */
  --btn-primary-text: #FFFFFF;  /* 4.8:1 on #7C5FE0 */
  --btn-primary-hover: #6A4FCC;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #2D3436;
  --btn-secondary-border: #E2E8F0;
  --btn-secondary-hover: #F5F5F0;

  /* HUD / Shell bar */
  --hud-bg: #FFFFFF;
  --hud-text: #2D3436;
  --hud-accent: #7C5FE0;       /* Darkened from #A78BFA — 4.6:1 on white */
}

/* === Colourful Dark === */
:root[data-theme="colourful-dark"] {
  /* Backgrounds */
  --bg: #1A1520;
  --bg-surface: #251E2C;
  --bg-game: #1A1520;
  --bg-overlay: rgba(26, 21, 32, 0.95);

  /* Text */
  --text-primary: #F0ECF4;
  --text-secondary: #BDB4C8;
  --text-muted: #9590A5;       /* Lightened from #8A8098 — 4.8:1 on surface */

  /* Borders */
  --border: #3A3244;
  --border-light: #2E2838;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.35);

  /* Accent colours (brighter for dark bg contrast) — all pass 7:1+ on dark bg */
  --accent-primary: #FF8A8A;
  --accent-secondary: #6EE7D8;
  --accent-tertiary: #F5DC78;   /* Slightly desaturated from #FFE66D — reduces halation */
  --accent-purple: #C4A8FF;
  --accent-warm: #FFB06A;
  --accent-pink: #F9A8D4;
  --accent-blue: #80B4FF;

  /* Feedback */
  --success-bg: rgba(52, 211, 153, 0.15);
  --success-text: #6EE7B7;
  --error-bg: rgba(255, 107, 107, 0.15);
  --error-text: #FF8A8A;
  --warning-bg: rgba(255, 230, 109, 0.15);
  --warning-text: #F5DC78;

  /* Buttons — solid colours only */
  --btn-primary-bg: #C4A8FF;
  --btn-primary-text: #1A1520;
  --btn-primary-hover: #A888EE;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #F0ECF4;
  --btn-secondary-border: #3A3244;
  --btn-secondary-hover: #2E2838;

  /* HUD / Shell bar */
  --hud-bg: #251E2C;
  --hud-text: #F0ECF4;
  --hud-accent: #C4A8FF;
}

/* === Reduced Motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
}
/* shared/shell.css — Shell bar styles
   Uses kg- prefix on all class names to avoid conflicts with game CSS.
   All colours reference shared design tokens (var(--*)). */

/* Enforce [hidden] — author display rules (e.g. display:flex) override the
   user-agent's [hidden]{display:none}, so we must re-apply it explicitly. */
[hidden] { display: none !important; }

/* === Shell Bar === */
.kg-shell {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: var(--hud-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 0 var(--space-sm);
  z-index: 1000;
  font-family: var(--font-family);
}

/* Body offset — games/hub must add this so content isn't hidden under bar */
body {
  padding-top: 56px;
}

.kg-shell__btn {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs) var(--space-sm);
  min-height: 44px;
  min-width: 44px;
  background: none;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--hud-text);
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  transition: background var(--transition-fast);
  white-space: nowrap;
}

.kg-shell__btn:hover {
  background: var(--border);
}

.kg-shell__btn:focus-visible {
  outline: 2px solid var(--hud-accent);
  outline-offset: 2px;
}

.kg-shell__icon {
  font-size: var(--text-lg);
  line-height: 1;
}

.kg-shell__label {
  font-size: var(--text-sm);
  color: var(--hud-text);
}

.kg-shell__title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: var(--text-lg);
  font-weight: 900;
  color: var(--hud-text);
  white-space: nowrap;
  pointer-events: auto;
}

.kg-shell__home {
  text-decoration: none;
  border-radius: var(--radius-md);
  padding: 2px 8px;
  transition: background var(--transition-fast);
}

.kg-shell__home:hover {
  background: var(--border);
}

.kg-shell__spacer {
  flex: 1;
}

.kg-shell__version {
  font-size: 10px;
  font-family: var(--font-family);
  color: var(--hud-text);
  opacity: 0.35;
  white-space: nowrap;
  user-select: none;
}

.kg-shell__avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  background: var(--hud-accent);
  color: var(--hud-bg);
  font-weight: 900;
  font-size: var(--text-sm);
}

/* === Games Dropdown === */
.kg-shell__games-wrap {
  position: relative;
}

.kg-games-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-game-link {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  color: var(--text-primary);
  text-decoration: none;
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-game-link:hover {
  background: var(--border);
}

.kg-game-link__icon {
  font-size: var(--text-xl);
}

/* === Theme Dropdown === */
.kg-theme-dropdown {
  position: fixed;
  top: 52px;
  right: var(--space-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-theme-option {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  text-align: left;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-theme-option:hover,
.kg-theme-option.active {
  background: var(--border);
}

.kg-theme-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.kg-theme-swatch--colourful-light { background: var(--swatch-colourful-light-bg); border-color: var(--swatch-colourful-light-border); }
.kg-theme-swatch--colourful-dark  { background: var(--swatch-colourful-dark-bg);  border-color: var(--swatch-colourful-dark-border); }

/* === Overlays === */
.kg-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg);
}

.kg-overlay__content {
  background: var(--bg-surface);
  border-radius: var(--radius-2xl);
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  max-height: calc(100vh - var(--space-2xl));
  overflow-y: auto;
}

.kg-overlay__heading {
  font-size: var(--text-xl);
  font-weight: 900;
  color: var(--text-primary);
  margin-bottom: var(--space-lg);
  text-align: center;
}

/* === Player Grid === */
.kg-player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: var(--space-md);
}

.kg-player-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-md) var(--space-sm);
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  cursor: pointer;
  min-height: 44px;
  font-family: var(--font-family);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}

.kg-player-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.kg-player-card--add {
  border-style: dashed;
  color: var(--text-secondary);
}

.kg-player-card__avatar {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--accent-purple);
  color: var(--bg-surface);
  font-size: var(--text-xl);
  font-weight: 900;
}

.kg-player-card--add .kg-player-card__avatar {
  background: var(--border);
  color: var(--text-secondary);
}

.kg-player-card__name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.kg-player-card__bracket {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

/* === Add Player Form === */
.kg-form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  font-family: var(--font-family);
}

.kg-form-input {
  display: block;
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg);
  margin-bottom: var(--space-md);
  box-sizing: border-box;
  min-height: 44px;
  transition: border-color var(--transition-fast);
}

.kg-form-input:focus {
  outline: none;
  border-color: var(--hud-accent);
}

.kg-form-fieldset {
  border: none;
  padding: 0;
  margin: 0 0 var(--space-md) 0;
}

.kg-age-toggle {
  display: flex;
  gap: var(--space-xs);
  margin-bottom: var(--space-md);
}

.kg-age-tab {
  flex: 1;
  padding: var(--space-xs) var(--space-sm);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  background: none;
  cursor: pointer;
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  min-height: 44px;
  transition: all var(--transition-fast);
}

.kg-age-tab.active {
  background: var(--hud-accent);
  border-color: var(--hud-accent);
  color: var(--bg-surface);
}

.kg-form-field {
  margin-bottom: var(--space-sm);
}

.kg-form-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* === Buttons === */
.kg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-xl);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 800;
  cursor: pointer;
  min-height: 48px;
  transition: all var(--transition-fast);
  border: 2px solid transparent;
}

.kg-btn--primary {
  background: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border-color: var(--btn-primary-bg);
  flex: 1;
}

.kg-btn--primary:hover:not(:disabled) {
  background: var(--btn-primary-hover);
  border-color: var(--btn-primary-hover);
}

.kg-btn--primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.kg-btn--secondary {
  background: var(--btn-secondary-bg);
  color: var(--btn-secondary-text);
  border-color: var(--btn-secondary-border);
}

.kg-btn--secondary:hover {
  background: var(--btn-secondary-hover);
}

/* === Birthday nudge banner (Phase 4) === */
.kg-nudge-banner {
  width: 100%;
  margin-bottom: var(--space-sm);
  background: var(--warning-bg);
  border-radius: var(--radius-xl);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-family);
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text-primary);
  box-sizing: border-box;
}

.kg-nudge-banner__dismiss {
  background: none;
  border: none;
  cursor: pointer;
  font-size: var(--text-lg);
  color: var(--text-secondary);
  margin-left: auto;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === Responsive === */
@media (max-width: 540px) {
  .kg-shell__label {
    display: none;
  }
  .kg-shell__version {
    display: none;
  }
}

@media (max-width: 400px) {
  .kg-shell__title {
    display: none;
  }
  .kg-player-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
/* ===== Reset + Body ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-family);
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  padding-top: 56px;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  z-index: 0;
  opacity: 0.15;
  animation: mmFloat 8s ease-in-out infinite;
  pointer-events: none;
}
body::before { width: 300px; height: 300px; background: var(--accent-blue); top: -80px; right: -80px; }
body::after  { width: 250px; height: 250px; background: var(--accent-purple); bottom: -60px; left: -60px; animation-delay: -4s; }

@keyframes mmFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(15px,20px) scale(1.05); }
}

/* ===== Screens ===== */
#mm-app { position: relative; z-index: 1; }
.mm-screen { min-height: calc(100vh - 56px); display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px 48px; }
.mm-screen[hidden] { display: none !important; }

/* ===== Settings ===== */
.mm-settings-wrap {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.mm-logo { font-size: 4rem; text-align: center; animation: mmBounce 0.6s ease-out; }

@keyframes mmBounce {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.mm-title {
  font-size: 2.4rem;
  font-weight: 900;
  text-align: center;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.mm-fieldset { border: none; padding: 0; }

.mm-legend {
  font-size: var(--text-sm);
  font-weight: 800;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-sm);
  display: block;
}

.mm-toggle-row { display: flex; flex-wrap: wrap; gap: var(--space-xs); }

.mm-toggle {
  flex: 1;
  min-width: 64px;
  min-height: 48px;
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  background: var(--bg-surface);
  font-family: var(--font-family);
  font-size: var(--text-lg);
  font-weight: 800;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  padding: 4px 8px;
  line-height: 1.2;
}
.mm-toggle:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
.mm-toggle--active {
  background: var(--accent-blue);
  border-color: var(--accent-blue);
  color: #fff;
}
.mm-toggle--active:hover { background: var(--accent-blue); color: #fff; }

/* Peek toggle row */
.mm-peek-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-surface);
  border-radius: var(--radius-xl);
  padding: 14px 20px;
  box-shadow: var(--shadow);
}
.mm-peek-label {
  font-size: var(--text-lg);
  font-weight: 800;
  color: var(--text-primary);
}
.mm-peek-sub {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  font-weight: 600;
  display: block;
}

/* Toggle switch */
.mm-switch { position: relative; display: inline-block; width: 52px; height: 28px; }
.mm-switch input { opacity: 0; width: 0; height: 0; }
.mm-slider {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--border);
  border-radius: 28px;
  transition: background var(--transition-fast);
}
.mm-slider::before {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  left: 4px; top: 4px;
  background: #fff;
  border-radius: 50%;
  transition: transform var(--transition-fast);
}
.mm-switch input:checked + .mm-slider { background: var(--accent-blue); }
.mm-switch input:checked + .mm-slider::before { transform: translateX(24px); }

/* Play button */
.mm-play-btn {

/* ===== Board Screen ===== */
.mm-board-inner {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.mm-hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px;
}

.mm-hud-back {
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: var(--text-secondary);
  font-family: var(--font-family);
  font-weight: 800;
  padding: 4px 8px;
}
.mm-hud-back:hover { color: var(--text-primary); }

.mm-hud-flips {
  font-size: var(--text-lg);
  font-weight: 800;
  color: var(--text-secondary);
}

.mm-grid {
  display: grid;
  gap: 6px;
}

/* ===== Cards ===== */
.mm-card {
  aspect-ratio: 3/4;
  cursor: pointer;
  perspective: 600px;
  -webkit-tap-highlight-color: transparent;
}

.mm-card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.3s ease;
  border-radius: var(--radius-xl);
}

.mm-card--flipped .mm-card-inner,
.mm-card--matched .mm-card-inner {
  transform: rotateY(180deg);
}

.mm-card-back, .mm-card-front {
  position: absolute; inset: 0;
  border-radius: var(--radius-xl);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mm-card-back {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  box-shadow: var(--shadow);
  font-size: 2rem;
  color: rgba(255,255,255,0.7);
  font-weight: 900;
}

.mm-card-front {
  background: var(--bg-surface);
  box-shadow: var(--shadow);
  transform: rotateY(180deg);
}

.mm-card-emoji {
  font-size: clamp(1.5rem, 5vw, 3rem);
  line-height: 1;
  user-select: none;
}

.mm-card--matched .mm-card-front {
  background: #d4f7e4;
  box-shadow: 0 0 0 3px #34c76f, var(--shadow);
}

@keyframes mmShake {
  0%,100% { transform: rotateY(180deg) translateX(0); }
  20% { transform: rotateY(180deg) translateX(-6px); }
  40% { transform: rotateY(180deg) translateX(6px); }
  60% { transform: rotateY(180deg) translateX(-4px); }
  80% { transform: rotateY(180deg) translateX(4px); }
}

.mm-card--mismatch .mm-card-inner {
  animation: mmShake 0.4s ease;
}

@keyframes mmPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
@keyframes mmPulseGlow {
  0%,100% { box-shadow: var(--shadow); }
  50% { box-shadow: 0 0 0 4px var(--accent-blue), var(--shadow); }
}
.mm-card--hint { animation: mmPulse 0.6s ease 2; }
.mm-card--hint .mm-card-inner { animation: mmPulseGlow 0.6s ease 2; }

/* ===== Win Screen ===== */
.mm-win-wrap {
  width: 100%;
  max-width: 480px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;

.mm-win-emoji {

}

.mm-win-title {
  font-size: 2.8rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.mm-win-flips {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--text-secondary);
}

.mm-win-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--radius-xl);
  font-family: var(--font-family);
  font-size: 1.2rem;
  font-weight: 900;
  cursor: pointer;
  transition: transform var(--transition-fast);
}
.mm-win-btn:hover { transform: translateY(-2px); }
.mm-win-btn--primary {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  color: #fff;
  box-shadow: var(--shadow);
}
.mm-win-btn--secondary {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 2px solid var(--border);
}

  <script>
(function() { 'use strict';
// shared/storage.js — Player profiles and namespaced game data
// NOTE: This file is concatenated INSIDE the shell IIFE by the build script.
// Do NOT wrap in its own IIFE.

const STORAGE_PREFIX = 'kidsgames_';
const PLAYERS_KEY = STORAGE_PREFIX + 'players';
const ACTIVE_KEY = STORAGE_PREFIX + 'activePlayer';

function _read(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw === null ? null : JSON.parse(raw);
  } catch (e) {
    console.error('KidsGames: corrupt data for key', key, e);
    return null;
  }
}

function _write(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch (e) {
    console.error('KidsGames: storage write failed', key, e);
    return false;
  }
}

// Sanitise player names: letters/numbers/spaces/hyphens/apostrophes, max 20 chars
function sanitiseName(name) {
  return name.replace(/[^\p{L}\p{N} '\-]/gu, '').trim().slice(0, 20);
}

// Escape HTML to prevent injection when inserting into innerHTML
function escapeHtml(str) {
  const el = document.createElement('span');
  el.textContent = str;
  return el.innerHTML;
}

function getAllPlayers() {
  return _read(PLAYERS_KEY) || {};
}

function getPlayer(name) {
  const players = getAllPlayers();
  return players[name] || null;
}

function createPlayer(name, { dob, manualAge }) {
  name = sanitiseName(name);
  if (!name) return false;
  const players = getAllPlayers();
  if (players[name]) return false; // already exists
  players[name] = {
    name: name,
    dob: dob || null,
    manualAge: dob ? null : (manualAge || null),
    theme: getDefaultTheme(),
    createdAt: new Date().toISOString().slice(0, 10)
  };
  // Return the sanitised name on success so callers can look up the right key
  return _write(PLAYERS_KEY, players) ? name : false;
}

function savePlayer(name, data) {
  const players = getAllPlayers();
  if (!players[name]) return;
  players[name] = { ...players[name], ...data };
  _write(PLAYERS_KEY, players);
}

function deletePlayer(name) {
  const players = getAllPlayers();
  delete players[name];
  _write(PLAYERS_KEY, players);
  // Clean up game-specific data — match exact suffix pattern
  const suffix = '_' + name;
  try {
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(STORAGE_PREFIX) && k.endsWith(suffix) && k !== PLAYERS_KEY && k !== ACTIVE_KEY) {
        localStorage.removeItem(k);
      }
    });
  } catch (e) {
    console.error('KidsGames: failed to clean up game data for player', name, e);
  }
}

function getActivePlayer() {
  const name = _read(ACTIVE_KEY);
  return name ? getPlayer(name) : null;
}

function setActivePlayer(name) {
  _write(ACTIVE_KEY, name);
}

function getAgeBracket(player) {
  const age = getAge(player);
  if (age === null) return '6-8'; // fallback
  if (age <= 5) return '4-5';
  if (age <= 8) return '6-8';
  if (age <= 12) return '9-12';
  return '13+';
}

function getAge(player) {
  if (player.dob) {
    const today = new Date();
    const birth = new Date(player.dob);
    let age = today.getFullYear() - birth.getFullYear();
    const monthDiff = today.getMonth() - birth.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
    return age;
  }
  return player.manualAge || null;
}

function getDefaultTheme() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
    ? 'colourful-dark' : 'colourful-light';
}

// Game-specific data
function loadGameData(gameId) {
  const player = getActivePlayer();
  if (!player) return {};
  return _read(STORAGE_PREFIX + gameId + '_' + player.name) || {};
}

function saveGameData(gameId, data) {
  const player = getActivePlayer();
  if (!player) return;
  _write(STORAGE_PREFIX + gameId + '_' + player.name, data);
}
// shared/shell.js — Shell bar logic
// NOTE: The build script wraps storage.js + shell.js together in a single IIFE.
// Storage functions (getPlayer, savePlayer, etc.) are available here without import.




  // --- Expose public API ---
  const _playerChangeListeners = [];

  window.KidsGames = {
    get player() {
      const p = getActivePlayer();
      if (!p) return null;
      return { name: p.name, ageBracket: getAgeBracket(p), theme: p.theme };
    },
    get muted() { return muted; },
    loadGameData: loadGameData,
    saveGameData: saveGameData,
    onPlayerChange(fn) { _playerChangeListeners.push(fn); },
  };

  function _notifyPlayerChange() {
    const ctx = window.KidsGames.player;
    _playerChangeListeners.forEach(fn => { try { fn(ctx); } catch(e) { console.error(e); } });
  }

  // --- Games list — update when adding new games ---
  const GAMES = [
    { id: 'type-trainer',  title: 'Type Trainer',  icon: '⌨️',  url: 'type-trainer.html',  needsKeyboard: true  },
    { id: 'opposites',     title: 'Opposites',      icon: '🔄',  url: 'opposites.html',     needsKeyboard: false },
    { id: 'number-bonds',  title: 'Number Bonds',   icon: '🔢',  url: 'number-bonds.html',  needsKeyboard: false },
  ];

  // --- Volume state ---
  let muted = false;

  // --- Migration helpers ---

  function bracketToAge(bracket) {
    const map = { '4-5': 5, '6-8': 7, '9-12': 10, 'Adult': 18, '13+': 18 };
    return map[bracket] || 7;
  }

  function migrateTypeTrainerData() {
    // Only run once
    if (localStorage.getItem('kidsgames_migrated_typetrainer')) return;

    let oldPlayers;
    try {
      oldPlayers = JSON.parse(localStorage.getItem('players') || 'null');
    } catch (e) {
      console.error('KidsGames: corrupt old player data, skipping migration', e);
      localStorage.setItem('kidsgames_migrated_typetrainer', 'true');
      return;
    }

    if (!oldPlayers || !oldPlayers.players) {
      localStorage.setItem('kidsgames_migrated_typetrainer', 'true');
      return;
    }

    // Migrate each player profile
    Object.entries(oldPlayers.players).forEach(([name, data]) => {
      if (!getPlayer(name)) {
        const theme = data.settings && data.settings.theme ? data.settings.theme : 'colourful-light';
        const themeMap = { 'light': 'colourful-light', 'dark': 'colourful-dark', 'clean-light': 'colourful-light', 'clean-dark': 'colourful-dark', 'colourful-light': 'colourful-light', 'colourful-dark': 'colourful-dark' };
        createPlayer(name, { dob: null, manualAge: bracketToAge(data.ageBracket) });
        savePlayer(name, { theme: themeMap[theme] || theme });
      }
      // Migrate game-specific data
      const key = STORAGE_PREFIX + 'typetrainer_' + name;
      _write(key, {
        highScore: data.highScore || 0,
        highestStage: data.highestStage || 0,
        totalGamesPlayed: data.totalGamesPlayed || 0,
        stats: data.stats || {},
        speedPreference: (data.settings && data.settings.speedPreference) || 1.8,
      });
    });

    // Set active player from old data
    const lastPlayer = localStorage.getItem('typingGame_lastPlayer');
    if (lastPlayer && getPlayer(lastPlayer)) {
      setActivePlayer(lastPlayer);
    }

    // Clean up old keys (only if migration succeeded)
    const newPlayers = getAllPlayers();
    if (Object.keys(newPlayers).length > 0) {
      localStorage.removeItem('players');
      localStorage.removeItem('currentPlayer');
      localStorage.removeItem('typingGame_theme');
      localStorage.removeItem('typingGame_lastPlayer');
    } else {
      console.error('KidsGames: migration wrote no players — keeping old keys as backup');
    }
    localStorage.setItem('kidsgames_migrated_typetrainer', 'true');
  }

  // --- Form helpers ---
  function _resetAddPlayerForm() {
    const nameInput = document.getElementById('kg-name-input');
    nameInput.value = '';
    nameInput.disabled = false;
    document.getElementById('kg-dob-input').value = '';
    document.getElementById('kg-age-input').value = '';
    document.getElementById('kg-addplayer-submit').disabled = true;
    document.getElementById('kg-addplayer-heading').textContent = 'New Player';
    // Reset to DoB tab
    document.querySelectorAll('.kg-age-tab').forEach(tab => {
      const isDob = tab.dataset.mode === 'dob';
      tab.classList.toggle('active', isDob);
      tab.setAttribute('aria-selected', isDob ? 'true' : 'false');
    });
    document.getElementById('kg-dob-field').hidden = false;
    document.getElementById('kg-age-field').hidden = true;
  }

  function _cancelAgeUpdate() {
    const form = document.getElementById('kg-addplayer-form');
    if (form._ageUpdateHandler) {
      form.removeEventListener('submit', form._ageUpdateHandler);
      form._ageUpdateHandler = null;
    }
    _resetAddPlayerForm();
  }

  // --- Age update (from nudge banner) ---
  function showAgeUpdate(player) {
    const addOverlay = document.getElementById('kg-addplayer-overlay');
    const playerOverlay = document.getElementById('kg-player-overlay');
    _cancelAgeUpdate(); // clean up any stale handler and reset form state
    document.getElementById('kg-addplayer-heading').textContent = 'Update age for ' + escapeHtml(player.name);
    const nameInput = document.getElementById('kg-name-input');
    nameInput.value = player.name;
    nameInput.disabled = true;
    document.getElementById('kg-addplayer-submit').disabled = false;
    playerOverlay.hidden = true;
    addOverlay.hidden = false;

    const form = document.getElementById('kg-addplayer-form');
    function handler(e) {
      e.preventDefault();
      const dob = document.getElementById('kg-dob-input').value || null;
      const manualAge = document.getElementById('kg-age-input').value
        ? parseInt(document.getElementById('kg-age-input').value) : null;
      savePlayer(player.name, {
        dob: dob || player.dob,
        manualAge: dob ? null : (manualAge || player.manualAge),
        lastAgeNudge: new Date().toISOString().slice(0, 10),
      });
      addOverlay.hidden = true;
      _cancelAgeUpdate();
      showPlayerSelect();
    }
    form._ageUpdateHandler = handler;
    form.addEventListener('submit', handler);
  }

  // --- OS colour scheme detection ---
  function applyOSThemePreference() {
    // Only applies if no active player (first visit or guest)
    if (getActivePlayer()) return;
    // Default to colourful-light for both light and no-preference
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = prefersDark ? 'colourful-dark' : 'colourful-light';
    document.documentElement.setAttribute('data-theme', theme);
  }

  // --- Init ---
  let _initialized = false;  // guard against double-invocation

  function initShell() {
    if (_initialized) return;
    _initialized = true;

    applyOSThemePreference();

    // Migrate old type trainer data (only runs once, only on type-trainer page)
    if (document.body.dataset.page === 'type-trainer') {
      migrateTypeTrainerData();
    }

    renderGamesDropdown();

    // Restrict DoB input to today (prevents negative ages from future dates)
    const dobInput = document.getElementById('kg-dob-input');
    if (dobInput) dobInput.max = new Date().toISOString().slice(0, 10);

    // Hide games dropdown button on the hub (hub IS the games list)
    if (document.body.dataset.page === 'hub') {
      document.getElementById('kg-games-btn').hidden = true;
    }

    const activePlayer = getActivePlayer();
    if (!activePlayer) {
      showPlayerSelect();
    } else {
      applyPlayer(activePlayer);
    }
    bindEvents();
  }

  // --- Player selection ---
  function getPlayersDueForNudge(players) {
    return Object.values(players).filter(p => {
      if (getAge(p) === null) return false;
      // Don't show if dismissed less than 7 days ago
      const lastSeen = p.lastAgeNudgeSeen || '2000-01-01';
      const daysSinceSeen = (Date.now() - new Date(lastSeen).getTime()) / 86400000;
      if (daysSinceSeen < 7) return false;
      // Show if it's been at least a year since last nudge
      const lastNudge = p.lastAgeNudge || p.createdAt;
      const daysSinceNudge = (Date.now() - new Date(lastNudge).getTime()) / 86400000;
      return daysSinceNudge >= 365;
    });
  }

  function showPlayerSelect() {
    const overlay = document.getElementById('kg-player-overlay');
    const grid = document.getElementById('kg-player-grid');
    const players = getAllPlayers();

    let html = '';
    Object.values(players).forEach(p => {
      const safeName = escapeHtml(p.name);
      const initial = escapeHtml(p.name.charAt(0).toUpperCase());
      const bracket = getAgeBracket(p);
      html += `
        <button class="kg-player-card" data-player="${p.name}">
          <span class="kg-player-card__avatar">${initial}</span>
          <span class="kg-player-card__name">${safeName}</span>
          <span class="kg-player-card__bracket">${bracket}</span>
        </button>`;
    });
    html += `
      <button class="kg-player-card kg-player-card--add" id="kg-add-player-btn" aria-label="Add new player">
        <span class="kg-player-card__avatar">+</span>
        <span class="kg-player-card__name">New Player</span>
      </button>`;

    const dueForNudge = getPlayersDueForNudge(players);
    const overlayContent = overlay.querySelector('.kg-overlay__content');
    // Remove any existing nudge banner
    const existingNudge = overlayContent.querySelector('.kg-nudge-banner');
    if (existingNudge) existingNudge.remove();

    if (dueForNudge.length > 0) {
      const names = dueForNudge.map(p => escapeHtml(p.name)).join(', ');
      const banner = document.createElement('div');
      banner.className = 'kg-nudge-banner';
      banner.innerHTML = `
        <span class="kg-nudge-banner__icon" aria-hidden="true">🎂</span>
        <span class="kg-nudge-banner__text">Time to check ages for ${names}!</span>
        <button class="kg-btn kg-btn--secondary kg-nudge-banner__btn" id="kg-nudge-update">Update ages</button>
        <button class="kg-nudge-banner__dismiss" aria-label="Dismiss age reminder">✕</button>
      `;
      overlayContent.insertBefore(banner, overlayContent.querySelector('.kg-overlay__heading').nextSibling);
    }

    grid.innerHTML = html;
    overlay.hidden = false;
    const firstCard = grid.querySelector('.kg-player-card');
    if (firstCard) firstCard.focus();

    if (dueForNudge.length > 0) {
      document.getElementById('kg-nudge-update')?.addEventListener('click', () => {
        showAgeUpdate(dueForNudge[0]);
      });
      overlayContent.querySelector('.kg-nudge-banner__dismiss')?.addEventListener('click', () => {
        dueForNudge.forEach(p => {
          savePlayer(p.name, { lastAgeNudgeSeen: new Date().toISOString().slice(0, 10) });
        });
        overlayContent.querySelector('.kg-nudge-banner')?.remove();
      });
    }
  }

  function applyPlayer(player) {
    setActivePlayer(player.name);
    // Migrate any clean theme stored before the theme reduction
    let theme = player.theme;
    if (theme === 'clean-light' || !theme) theme = 'colourful-light';
    else if (theme === 'clean-dark') theme = 'colourful-dark';
    if (theme !== player.theme) savePlayer(player.name, { theme });
    document.getElementById('kg-player-avatar').textContent = player.name.charAt(0).toUpperCase();
    document.getElementById('kg-player-name').textContent = player.name;
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('kg-player-overlay').hidden = true;
    _notifyPlayerChange();
  }

  // --- Theme picker ---
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const player = getActivePlayer();
    if (player) {
      savePlayer(player.name, { theme });
    }
  }

  function toggleThemeDropdown() {
    const dd = document.getElementById('kg-theme-dropdown');
    const btn = document.getElementById('kg-theme-btn');
    dd.hidden = !dd.hidden;
    btn.setAttribute('aria-expanded', !dd.hidden);
    if (!dd.hidden) {
      // Highlight current theme
      const current = document.documentElement.getAttribute('data-theme');
      dd.querySelectorAll('.kg-theme-option').forEach(b => {
        b.classList.toggle('active', b.dataset.theme === current);
      });
    }
  }

  // --- Games dropdown ---
  function renderGamesDropdown() {
    const dd = document.getElementById('kg-games-dropdown');
    dd.innerHTML = GAMES.map(g => `
      <a href="${g.url}" class="kg-game-link${g.needsKeyboard ? ' kg-needs-keyboard' : ''}">
        <span class="kg-game-link__icon">${g.icon}</span>
        <span class="kg-game-link__title">${escapeHtml(g.title)}</span>
      </a>
    `).join('');
  }

  // --- Volume ---
  function toggleMute() {
    muted = !muted;
    document.getElementById('kg-volume-icon').textContent = muted ? '🔇' : '🔊';
    document.getElementById('kg-volume-btn').setAttribute('aria-pressed', muted);
  }

  // --- Event binding ---
  function bindEvents() {
    // Games dropdown
    document.getElementById('kg-games-btn').addEventListener('click', () => {
      const dd = document.getElementById('kg-games-dropdown');
      const btn = document.getElementById('kg-games-btn');
      dd.hidden = !dd.hidden;
      btn.setAttribute('aria-expanded', !dd.hidden);
    });

    // Player button
    document.getElementById('kg-player-btn').addEventListener('click', showPlayerSelect);

    // Player card selection (delegated)
    document.getElementById('kg-player-grid').addEventListener('click', (e) => {
      const card = e.target.closest('.kg-player-card');
      if (!card) return;
      if (card.id === 'kg-add-player-btn') {
        document.getElementById('kg-player-overlay').hidden = true;
        _resetAddPlayerForm();
        document.getElementById('kg-addplayer-overlay').hidden = false;
        document.getElementById('kg-name-input').focus();
        return;
      }
      const name = card.dataset.player;
      const player = getPlayer(name);
      if (player) applyPlayer(player);
    });

    // Add player form
    document.getElementById('kg-addplayer-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('kg-name-input').value.trim();
      const dobInput = document.getElementById('kg-dob-input');
      const ageInput = document.getElementById('kg-age-input');
      const dob = dobInput.value || null;
      const manualAge = ageInput.value ? parseInt(ageInput.value) : null;

      if (!name) return;
      const created = createPlayer(name, { dob, manualAge });
      if (created) {
        const player = getPlayer(created);
        document.getElementById('kg-addplayer-overlay').hidden = true;
        _resetAddPlayerForm();
        applyPlayer(player);
      }
    });

    // Add player cancel
    document.getElementById('kg-addplayer-cancel').addEventListener('click', () => {
      document.getElementById('kg-addplayer-overlay').hidden = true;
      _cancelAgeUpdate();
      showPlayerSelect();
    });

    // Age toggle (dob vs manual)
    document.querySelectorAll('.kg-age-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.kg-age-tab').forEach(t => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        const mode = tab.dataset.mode;
        document.getElementById('kg-dob-field').hidden = mode !== 'dob';
        document.getElementById('kg-age-field').hidden = mode !== 'age';
      });
    });

    // Enable submit when name is entered
    document.getElementById('kg-name-input').addEventListener('input', (e) => {
      document.getElementById('kg-addplayer-submit').disabled = !e.target.value.trim();
    });

    // Theme picker
    document.getElementById('kg-theme-btn').addEventListener('click', toggleThemeDropdown);
    document.getElementById('kg-theme-dropdown').addEventListener('click', (e) => {
      const option = e.target.closest('.kg-theme-option');
      if (!option) return;
      setTheme(option.dataset.theme);
      document.getElementById('kg-theme-dropdown').hidden = true;
      document.getElementById('kg-theme-btn').setAttribute('aria-expanded', 'false');
    });

    // Volume
    document.getElementById('kg-volume-btn').addEventListener('click', toggleMute);

    // Keyboard: Escape closes overlays/dropdowns, Tab traps focus in overlays
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const playerOverlay = document.getElementById('kg-player-overlay');
        const addOverlay = document.getElementById('kg-addplayer-overlay');
        const gamesDD = document.getElementById('kg-games-dropdown');
        const themeDD = document.getElementById('kg-theme-dropdown');

        if (!themeDD.hidden) {
          themeDD.hidden = true;
          document.getElementById('kg-theme-btn').setAttribute('aria-expanded', 'false');
          return;
        }
        if (!gamesDD.hidden) {
          gamesDD.hidden = true;
          document.getElementById('kg-games-btn').setAttribute('aria-expanded', 'false');
          return;
        }
        if (!addOverlay.hidden) { addOverlay.hidden = true; _cancelAgeUpdate(); showPlayerSelect(); return; }
        // Player overlay: only close if there's an active player (can't dismiss on first visit)
        if (!playerOverlay.hidden && getActivePlayer()) { playerOverlay.hidden = true; return; }
      }

      if (e.key === 'Tab') {
        const openOverlay = document.querySelector('.kg-overlay:not([hidden])');
        if (!openOverlay) return;
        const focusable = openOverlay.querySelectorAll('button:not([disabled]), input, select, textarea, a[href], [tabindex]:not([tabindex="-1"])');
        if (!focusable.length) return;
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault(); first.focus();
        }
      }
    });

    // Lock body scroll when overlay is open
    const scrollObserver = new MutationObserver(() => {
      const anyOpen = document.querySelector('.kg-overlay:not([hidden])');
      document.body.style.overflow = anyOpen ? 'hidden' : '';
    });
    document.querySelectorAll('.kg-overlay').forEach(o => {
      scrollObserver.observe(o, { attributes: true, attributeFilter: ['hidden'] });
    });

    // Close dropdowns on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.kg-shell__games-wrap')) {
        document.getElementById('kg-games-dropdown').hidden = true;
        document.getElementById('kg-games-btn').setAttribute('aria-expanded', 'false');
      }
      if (!e.target.closest('#kg-theme-btn') && !e.target.closest('.kg-theme-dropdown')) {
        document.getElementById('kg-theme-dropdown').hidden = true;
        document.getElementById('kg-theme-btn').setAttribute('aria-expanded', 'false');
      }
    });

    // OS colour scheme: auto-switch theme when no player is logged in
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      // Only auto-switch if no player has explicitly chosen a theme
      if (getActivePlayer()) return;
      const theme = e.matches ? 'colourful-dark' : 'colourful-light';
      document.documentElement.setAttribute('data-theme', theme);
    });
  }

  // --- Init on DOM ready ---
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initShell);
  } else {
    initShell();
  }

})();
  </script>
<script>
// ===== STATE =====
const state = {
  size: '3x4',
  theme: 'animals',
  peek: true,
};

// ===== TOGGLE GROUPS =====
function initToggleGroup(rowId, stateKey) {
  const row = document.getElementById(rowId);
  row.addEventListener('click', e => {
    const btn = e.target.closest('[data-' + stateKey + ']');
    if (!btn || !row.contains(btn)) return;
    row.querySelectorAll('.mm-toggle').forEach(b => {
      b.classList.remove('mm-toggle--active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('mm-toggle--active');
    btn.setAttribute('aria-pressed', 'true');
    state[stateKey] = btn.dataset[stateKey];
  });
}

initToggleGroup('mm-size-row', 'size');
initToggleGroup('mm-theme-row', 'theme');

document.getElementById('mm-peek-toggle').addEventListener('change', e => {
  state.peek = e.target.checked;
});

document.getElementById('mm-play-btn').addEventListener('click', startGame);

// ===== EMOJI POOLS =====
const EMOJIS = {
  animals:  ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐸','🐵','🐔','🐧','🐦','🦆','🦉','🦋','🐢'],
  food:     ['🍎','🍊','🍋','🍇','🍓','🍒','🍕','🍔','🌮','🍦','🍩','🍪','🎂','🧁','🍫','🍬','🥐','🧇','🥞','🍿'],
  vehicles: ['🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','🚐','🛻','🚚','🚛','✈️','🚀','🛸','🚁','⛵','🚂','🚤'],
};

const SIZES = {
  '2x4': { cols: 2, rows: 4 },
  '3x4': { cols: 3, rows: 4 },
  '4x4': { cols: 4, rows: 4 },
  '4x5': { cols: 4, rows: 5 },
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck(theme, pairs) {
  let pool;
  if (theme === 'random') {
    pool = shuffle([...EMOJIS.animals, ...EMOJIS.food, ...EMOJIS.vehicles]);
  } else {
    pool = shuffle([...EMOJIS[theme]]);
  }
  const chosen = pool.slice(0, pairs);
  return shuffle([...chosen, ...chosen]);
}

// ===== GAME STATE =====
let flipped = [];
let matched = 0;
let flips = 0;
let locked = false;
let firstTap = true;

function showScreen(id) {
  ['mm-settings','mm-board-screen','mm-win-screen'].forEach(s => {
    document.getElementById(s).hidden = s !== id;
  });
}

function goSettings() {
  if (_peekTimer) { clearTimeout(_peekTimer); _peekTimer = null; locked = false; }
  window.removeEventListener('resize', handleResize);
  showScreen('mm-settings');
}

let _sizeArgs = null;
function handleResize() {
  if (!_sizeArgs) return;
  const grid = document.getElementById('mm-grid');
  if (grid) sizeCards(grid, _sizeArgs.cols, _sizeArgs.rows);
}

function sizeCards(grid, cols, rows) {
  let c = cols, r = rows;
  if (state.size === '4x5' && window.innerWidth > window.innerHeight) {
    c = 5; r = 4;
  }
  grid.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
  const pad = 32, gap = 6, headerH = 56 + 56;
  const maxW = Math.floor((window.innerWidth - pad - gap * (c - 1)) / c);
  const maxH = Math.floor((window.innerHeight - headerH - pad - gap * (r - 1)) / r);
  const size = Math.min(maxW, maxH, 160);
  grid.querySelectorAll('.mm-card').forEach(card => {
    card.style.width = size + 'px';
    card.style.height = Math.floor(size * 4 / 3) + 'px';
  });
}

function startGame() {
  const { cols, rows } = SIZES[state.size];
  const pairs = cols * rows / 2;
  const deck = buildDeck(state.theme, pairs);

  window.removeEventListener('resize', handleResize);
  flipped = []; matched = 0; flips = 0; locked = false; firstTap = true;

  const boardScreen = document.getElementById('mm-board-screen');
  boardScreen.innerHTML = `
    <div class="mm-board-inner">
      <div class="mm-hud">
        <button class="mm-hud-back" id="mm-back-btn">← Settings</button>
        <div class="mm-hud-flips" id="mm-flips-display">0 flips</div>
      </div>
      <div class="mm-grid" id="mm-grid"
           style="grid-template-columns: repeat(${cols}, 1fr);">
      </div>
    </div>
  `;

  const grid = document.getElementById('mm-grid');
  _sizeArgs = { cols, rows };
  sizeCards(grid, cols, rows);
  window.addEventListener('resize', handleResize);

  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'mm-card';
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.innerHTML = `
      <div class="mm-card-inner">
        <div class="mm-card-back">?</div>
        <div class="mm-card-front"><span class="mm-card-emoji">${emoji}</span></div>
      </div>
    `;
    card.addEventListener('click', () => onCardClick(card));
    grid.appendChild(card);
  });

  document.getElementById('mm-back-btn').addEventListener('click', goSettings);

  showScreen('mm-board-screen');
  if (state.peek) doPeek(grid);
}

function onCardClick(card) {
  if (locked) return;
  if (card.classList.contains('mm-card--flipped')) return;
  if (card.classList.contains('mm-card--matched')) return;
  if (flipped.length === 2) return;

  if (firstTap) {
    firstTap = false;
    showFirstPlayHint(card);
  }

  playSound('flip');
  card.classList.add('mm-card--flipped');
  flipped.push(card);
  flips++;
  const display = document.getElementById('mm-flips-display');
  if (display) display.textContent = flips + (flips === 1 ? ' flip' : ' flips');

  if (flipped.length === 2) {
    locked = true;
    setTimeout(evaluatePair, 350);
  }
}

function evaluatePair() {
  const [a, b] = flipped;
  if (a.dataset.emoji === b.dataset.emoji) {
    a.classList.add('mm-card--matched');
    b.classList.add('mm-card--matched');
    playSound('match');
    matched++;
    flipped = [];
    locked = false;
    const totalPairs = document.querySelectorAll('.mm-card').length / 2;
    if (matched === totalPairs) {
      setTimeout(showWin, 400);
    }
  } else {
    a.classList.add('mm-card--mismatch');
    b.classList.add('mm-card--mismatch');
    playSound('mismatch');
    setTimeout(() => {
      a.classList.remove('mm-card--flipped', 'mm-card--mismatch');
      b.classList.remove('mm-card--flipped', 'mm-card--mismatch');
      flipped = [];
      locked = false;
    }, 900);
  }
}

function showWin() {
  playSound('win');
  window.removeEventListener('resize', handleResize);
  const winScreen = document.getElementById('mm-win-screen');
  winScreen.innerHTML = `
    <div class="mm-win-wrap">
      <div class="mm-win-emoji">🎉</div>
      <div class="mm-win-title">You did it!</div>
      <div class="mm-win-flips">Matched all pairs in <strong>${flips}</strong> flip${flips === 1 ? '' : 's'}!</div>
      <button class="mm-win-btn mm-win-btn--primary" id="mm-play-again">Play Again 🃏</button>
      <button class="mm-win-btn mm-win-btn--secondary" id="mm-change-settings">Change Settings</button>
    </div>
  `;
  document.getElementById('mm-play-again').addEventListener('click', startGame);
  document.getElementById('mm-change-settings').addEventListener('click', goSettings);
  showScreen('mm-win-screen');
}

let _peekTimer = null;

function doPeek(grid) {
  locked = true;
  grid.querySelectorAll('.mm-card').forEach(card => {
    card.classList.add('mm-card--flipped');
  });
  _peekTimer = setTimeout(() => {
    _peekTimer = null;
    grid.querySelectorAll('.mm-card').forEach(card => {
      card.classList.remove('mm-card--flipped');
    });
    locked = false;
  }, 1500);
}

function showFirstPlayHint(tappedCard) {
  const candidates = [...document.querySelectorAll('.mm-card')]
    .filter(c => c !== tappedCard && !c.classList.contains('mm-card--matched'));
  if (!candidates.length) return;
  const hint = candidates[Math.floor(Math.random() * candidates.length)];
  hint.classList.add('mm-card--hint');
  hint.addEventListener('animationend', () => hint.classList.remove('mm-card--hint'), { once: true });
}

// ===== AUDIO =====
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep({ freq = 440, type = 'sine', gain = 0.3, duration = 0.1, delay = 0 } = {}) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g);
    g.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    g.gain.setValueAtTime(gain, ctx.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration + 0.05);
  } catch (e) { /* audio not available */ }
}

function playSound(type) {
  switch (type) {
    case 'flip':
      beep({ freq: 600, type: 'sine', gain: 0.15, duration: 0.08 });
      break;
    case 'match':
      beep({ freq: 523, gain: 0.25, duration: 0.15 });
      beep({ freq: 784, gain: 0.25, duration: 0.15, delay: 0.15 });
      break;
    case 'mismatch':
      beep({ freq: 220, type: 'triangle', gain: 0.2, duration: 0.2 });
      break;
    case 'win':
      [523, 659, 784, 1047].forEach((f, i) => {
        beep({ freq: f, gain: 0.25, duration: 0.18, delay: i * 0.18 });
      });
      break;
  }
}
