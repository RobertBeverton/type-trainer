<!DOCTYPE html>
<html lang="en" data-theme="colourful-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Bonds</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
/* shared/tokens.css — Design tokens for Kids Games hub
   Two themes: colourful-light, colourful-dark
   Set via data-theme attribute on <html> */

/* === Base Tokens (theme-agnostic) === */
:root {
  /* Typography */
  --font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;

  /* Spacing scale */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;  /* Oversized touch targets for young children */

  /* Border radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Font sizes */
  --text-xs: 11px;   /* Admin/hint text only — not readable by ages 4-5 */
  --text-sm: 13px;   /* Secondary text — not reliable for pre-readers */
  --text-base: 16px;
  --text-lg: 20px;
  --text-xl: 24px;
  --text-2xl: 30px;
  --text-3xl: 36px;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 300ms ease;

  /* === Usage Guide ===
     --bg:         Main page background
     --bg-surface: Elevated surfaces (cards, panels, modals)
     --bg-game:    Game play area (canvas container)
     --bg-overlay: Semi-transparent overlay behind modals

     Accent colours are for backgrounds, borders, and decorative fills.
     NOT safe as text colour on light themes — use --text-primary/secondary.
     On dark themes, all accents pass AA as text.
     Always pair colour feedback with animation/shape cues.

     --text-xs/--text-sm: Not readable by ages 4-5. Use --text-base+ for
     any content young children need to read.
  */

  /* TODO Phase 4: @media (prefers-contrast: more) overrides */

  /* Theme swatch colours — static, not theme-dependent (used by shell.css to preview each theme) */
  --swatch-colourful-light-bg: #FFF8E7;
  --swatch-colourful-light-border: #FF6B6B;
  --swatch-colourful-dark-bg: #1A1520;
  --swatch-colourful-dark-border: #C4A8FF;
}

/* === Colourful Light === */
:root[data-theme="colourful-light"] {
  /* Backgrounds */
  --bg: #FFF8E7;
  --bg-surface: #FFFFFF;
  --bg-game: #FFFFFF;
  --bg-overlay: rgba(255, 248, 231, 0.95);

  /* Text */
  --text-primary: #2D3436;
  --text-secondary: #636E72;
  --text-muted: #6E6E7E;       /* Darkened from #8A8A9A — 4.9:1 on white, 4.6:1 on cream */

  /* Borders */
  --border: #E2E8F0;
  --border-light: #EEEEEA;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);

  /* Accent colours — for backgrounds/borders/decorative use, NOT as text on light bg */
  --accent-primary: #FF6B6B;
  --accent-secondary: #4ECDC4;
  --accent-tertiary: #D4A300;   /* Darkened from #FFE66D — visible on cream (3.8:1) */
  --accent-purple: #A78BFA;
  --accent-warm: #FB923C;
  --accent-pink: #F472B6;
  --accent-blue: #60A5FA;

  /* Feedback */
  --success-bg: #D1FAE5;
  --success-text: #065F46;
  --error-bg: #FEE2E2;
  --error-text: #B91C1C;       /* Darkened from #DC2626 — 5.3:1 on error-bg */
  --warning-bg: #FEF3C7;
  --warning-text: #92400E;

  /* Buttons — MUST be solid colours, not gradients.
     Colourful gradient applied in component CSS via background: linear-gradient() */
  --btn-primary-bg: #7C5FE0;   /* Solid purple — used for border-color, outline, etc. */
  --btn-primary-text: #FFFFFF;  /* 4.8:1 on #7C5FE0 */
  --btn-primary-hover: #6A4FCC;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #2D3436;
  --btn-secondary-border: #E2E8F0;
  --btn-secondary-hover: #F5F5F0;

  /* HUD / Shell bar */
  --hud-bg: #FFFFFF;
  --hud-text: #2D3436;
  --hud-accent: #7C5FE0;       /* Darkened from #A78BFA — 4.6:1 on white */
}

/* === Colourful Dark === */
:root[data-theme="colourful-dark"] {
  /* Backgrounds */
  --bg: #1A1520;
  --bg-surface: #251E2C;
  --bg-game: #1A1520;
  --bg-overlay: rgba(26, 21, 32, 0.95);

  /* Text */
  --text-primary: #F0ECF4;
  --text-secondary: #BDB4C8;
  --text-muted: #9590A5;       /* Lightened from #8A8098 — 4.8:1 on surface */

  /* Borders */
  --border: #3A3244;
  --border-light: #2E2838;

  /* Shadows */
  --shadow: 0 8px 30px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.35);

  /* Accent colours (brighter for dark bg contrast) — all pass 7:1+ on dark bg */
  --accent-primary: #FF8A8A;
  --accent-secondary: #6EE7D8;
  --accent-tertiary: #F5DC78;   /* Slightly desaturated from #FFE66D — reduces halation */
  --accent-purple: #C4A8FF;
  --accent-warm: #FFB06A;
  --accent-pink: #F9A8D4;
  --accent-blue: #80B4FF;

  /* Feedback */
  --success-bg: rgba(52, 211, 153, 0.15);
  --success-text: #6EE7B7;
  --error-bg: rgba(255, 107, 107, 0.15);
  --error-text: #FF8A8A;
  --warning-bg: rgba(255, 230, 109, 0.15);
  --warning-text: #F5DC78;

  /* Buttons — solid colours only */
  --btn-primary-bg: #C4A8FF;
  --btn-primary-text: #1A1520;
  --btn-primary-hover: #A888EE;
  --btn-secondary-bg: transparent;
  --btn-secondary-text: #F0ECF4;
  --btn-secondary-border: #3A3244;
  --btn-secondary-hover: #2E2838;

  /* HUD / Shell bar */
  --hud-bg: #251E2C;
  --hud-text: #F0ECF4;
  --hud-accent: #C4A8FF;
}

/* === Reduced Motion === */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
}
/* shared/shell.css — Shell bar styles
   Uses kg- prefix on all class names to avoid conflicts with game CSS.
   All colours reference shared design tokens (var(--*)). */

/* Enforce [hidden] — author display rules (e.g. display:flex) override the
   user-agent's [hidden]{display:none}, so we must re-apply it explicitly. */
[hidden] { display: none !important; }

/* === Shell Bar === */
.kg-shell {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: var(--hud-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: 0 var(--space-sm);
  z-index: 1000;
  font-family: var(--font-family);
}

/* Body offset — games/hub must add this so content isn't hidden under bar */
body {
  padding-top: 56px;
}

.kg-shell__btn {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs) var(--space-sm);
  min-height: 44px;
  min-width: 44px;
  background: none;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  color: var(--hud-text);
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  transition: background var(--transition-fast);
  white-space: nowrap;
}

.kg-shell__btn:hover {
  background: var(--border);
}

.kg-shell__btn:focus-visible {
  outline: 2px solid var(--hud-accent);
  outline-offset: 2px;
}

.kg-shell__icon {
  font-size: var(--text-lg);
  line-height: 1;
}

.kg-shell__label {
  font-size: var(--text-sm);
  color: var(--hud-text);
}

.kg-shell__title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: var(--text-lg);
  font-weight: 900;
  color: var(--hud-text);
  white-space: nowrap;
  pointer-events: auto;
}

.kg-shell__home {
  text-decoration: none;
  border-radius: var(--radius-md);
  padding: 2px 8px;
  transition: background var(--transition-fast);
}

.kg-shell__home:hover {
  background: var(--border);
}

.kg-shell__spacer {
  flex: 1;
}

.kg-shell__version {
  font-size: 10px;
  font-family: var(--font-family);
  color: var(--hud-text);
  opacity: 0.35;
  white-space: nowrap;
  user-select: none;
}

.kg-shell__avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-full);
  background: var(--hud-accent);
  color: var(--hud-bg);
  font-weight: 900;
  font-size: var(--text-sm);
}

/* === Games Dropdown === */
.kg-shell__games-wrap {
  position: relative;
}

.kg-games-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-game-link {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  color: var(--text-primary);
  text-decoration: none;
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-game-link:hover {
  background: var(--border);
}

.kg-game-link__icon {
  font-size: var(--text-xl);
}

/* === Theme Dropdown === */
.kg-theme-dropdown {
  position: fixed;
  top: 52px;
  right: var(--space-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 180px;
  z-index: 1001;
  overflow: hidden;
}

.kg-theme-option {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  text-align: left;
  transition: background var(--transition-fast);
  min-height: 44px;
}

.kg-theme-option:hover,
.kg-theme-option.active {
  background: var(--border);
}

.kg-theme-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.kg-theme-swatch--colourful-light { background: var(--swatch-colourful-light-bg); border-color: var(--swatch-colourful-light-border); }
.kg-theme-swatch--colourful-dark  { background: var(--swatch-colourful-dark-bg);  border-color: var(--swatch-colourful-dark-border); }

/* === Overlays === */
.kg-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 1100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-lg);
}

.kg-overlay__content {
  background: var(--bg-surface);
  border-radius: var(--radius-2xl);
  padding: var(--space-xl) var(--space-lg);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 480px;
  max-height: calc(100vh - var(--space-2xl));
  overflow-y: auto;
}

.kg-overlay__heading {
  font-size: var(--text-xl);
  font-weight: 900;
  color: var(--text-primary);
  margin-bottom: var(--space-lg);
  text-align: center;
}

/* === Player Grid === */
.kg-player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: var(--space-md);
}

.kg-player-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-md) var(--space-sm);
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  cursor: pointer;
  min-height: 44px;
  font-family: var(--font-family);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
}

.kg-player-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.kg-player-card--add {
  border-style: dashed;
  color: var(--text-secondary);
}

.kg-player-card__avatar {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: var(--radius-full);
  background: var(--accent-purple);
  color: var(--bg-surface);
  font-size: var(--text-xl);
  font-weight: 900;
}

.kg-player-card--add .kg-player-card__avatar {
  background: var(--border);
  color: var(--text-secondary);
}

.kg-player-card__name {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.kg-player-card__bracket {
  font-size: var(--text-xs);
  color: var(--text-muted);
}

/* === Add Player Form === */
.kg-form-label {
  display: block;
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
  font-family: var(--font-family);
}

.kg-form-input {
  display: block;
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg);
  margin-bottom: var(--space-md);
  box-sizing: border-box;
  min-height: 44px;
  transition: border-color var(--transition-fast);
}

.kg-form-input:focus {
  outline: none;
  border-color: var(--hud-accent);
}

.kg-form-fieldset {
  border: none;
  padding: 0;
  margin: 0 0 var(--space-md) 0;
}

.kg-age-toggle {
  display: flex;
  gap: var(--space-xs);
  margin-bottom: var(--space-md);
}

.kg-age-tab {
  flex: 1;
  padding: var(--space-xs) var(--space-sm);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  background: none;
  cursor: pointer;
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-secondary);
  min-height: 44px;
  transition: all var(--transition-fast);
}

.kg-age-tab.active {
  background: var(--hud-accent);
  border-color: var(--hud-accent);
  color: var(--bg-surface);
}

.kg-form-field {
  margin-bottom: var(--space-sm);
}

.kg-form-actions {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

/* === Buttons === */
.kg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-xl);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 800;
  cursor: pointer;
  min-height: 48px;
  transition: all var(--transition-fast);
  border: 2px solid transparent;
}

.kg-btn--primary {
  background: var(--btn-primary-bg);
  color: var(--btn-primary-text);
  border-color: var(--btn-primary-bg);
  flex: 1;
}

.kg-btn--primary:hover:not(:disabled) {
  background: var(--btn-primary-hover);
  border-color: var(--btn-primary-hover);
}

.kg-btn--primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.kg-btn--secondary {
  background: var(--btn-secondary-bg);
  color: var(--btn-secondary-text);
  border-color: var(--btn-secondary-border);
}

.kg-btn--secondary:hover {
  background: var(--btn-secondary-hover);
}

/* === Birthday nudge banner (Phase 4) === */
.kg-nudge-banner {
  width: 100%;
  margin-bottom: var(--space-sm);
  background: var(--warning-bg);
  border-radius: var(--radius-xl);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-family: var(--font-family);
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--text-primary);
  box-sizing: border-box;
}

.kg-nudge-banner__dismiss {
  background: none;
  border: none;
  cursor: pointer;
  font-size: var(--text-lg);
  color: var(--text-secondary);
  margin-left: auto;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* === Responsive === */
@media (max-width: 540px) {
  .kg-shell__label {
    display: none;
  }
  .kg-shell__version {
    display: none;
  }
}

@media (max-width: 400px) {
  .kg-shell__title {
    display: none;
  }
  .kg-player-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
/* Number Bonds — game styles */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-family);
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  padding-top: 56px;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  z-index: 0;
  opacity: 0.15;
  animation: nbFloat 8s ease-in-out infinite;
  pointer-events: none;
}
body::before { width: 300px; height: 300px; background: var(--accent-tertiary); top: -80px; right: -80px; }
body::after  { width: 250px; height: 250px; background: var(--accent-secondary); bottom: -60px; left: -60px; animation-delay: -4s; }

@keyframes nbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(15px,20px) scale(1.05); }
}

/* === Screens === */

#nb-app {
  position: relative;
  z-index: 1;
}

.nb-screen {
  min-height: calc(100vh - 56px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 48px;
}

.nb-screen[hidden] { display: none !important; }

/* === Settings Screen === */

.nb-settings-wrap {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
}

.nb-logo {
  font-size: 4rem;
  text-align: center;
  animation: nbBounce 0.6s ease-out;
}

@keyframes nbBounce {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.nb-title {
  font-size: 2.4rem;
  font-weight: 900;
  text-align: center;
  background: linear-gradient(135deg, var(--accent-tertiary), var(--accent-primary), var(--accent-secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Fieldsets */
.nb-fieldset {
  border: none;
  padding: 0;
}

.nb-legend {
  font-size: var(--text-sm);
  font-weight: 800;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-sm);
  display: block;
}

/* Operation + Difficulty toggles */
.nb-toggle-row {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
}

.nb-toggle {
  flex: 1;
  min-width: 56px;
  min-height: 48px;
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  background: var(--bg-surface);
  font-family: var(--font-family);
  font-size: var(--text-lg);
  font-weight: 800;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.nb-toggle:hover {
  border-color: var(--hud-accent);
  color: var(--hud-accent);
}

.nb-toggle--active {
  background: var(--hud-accent);
  border-color: var(--hud-accent);
  color: var(--bg-surface);
}

.nb-diff-hint {
  font-size: var(--text-sm);
  color: var(--text-muted);
  font-weight: 600;
  margin-top: var(--space-xs);
}

/* Custom options */
.nb-custom-opts {
  background: var(--bg-surface);
  border-radius: var(--radius-xl);
  padding: var(--space-md);
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  border: 1px solid var(--border);
}

.nb-custom-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.nb-label {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--text-primary);
  flex: 1;
}

.nb-input {
  width: 90px;
  padding: var(--space-xs) var(--space-sm);
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--text-primary);
  background: var(--bg);
  text-align: center;
}

.nb-input:focus {

(function() { 'use strict';
// shared/storage.js — Player profiles and namespaced game data
// NOTE: This file is concatenated INSIDE the shell IIFE by the build script.

const PLAYERS_KEY = STORAGE_PREFIX + 'players';

function _read(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw === null ? null : JSON.parse(raw);
  } catch (e) {
    console.error('KidsGames: corrupt data for key', key, e);
    return null;
  }
}

function _write(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    return true;
  } catch (e) {
    console.error('KidsGames: storage write failed', key, e);
    return false;
  }
}

// Sanitise player names: letters/numbers/spaces/hyphens/apostrophes, max 20 chars
function sanitiseName(name) {
  return name.replace(/[^\p{L}\p{N} '\-]/gu, '').trim().slice(0, 20);

// Escape HTML to prevent injection when inserting into innerHTML

function getAllPlayers() {
  return _read(PLAYERS_KEY) || {};
}

function getPlayer(name) {
  const players = getAllPlayers();
  return players[name] || null;
}

function createPlayer(name, { dob, manualAge }) {
  name = sanitiseName(name);
  if (!name) return false;
  const players = getAllPlayers();
  if (players[name]) return false; // already exists
  players[name] = {
    name: name,
    dob: dob || null,
    manualAge: dob ? null : (manualAge || null),
    theme: getDefaultTheme(),
    createdAt: new Date().toISOString().slice(0, 10)
  };

  return _write(PLAYERS_KEY, players) ? name : false;
}

function savePlayer(name, data) {
  const players = getAllPlayers();
  if (!players[name]) return;
  players[name] = { ...players[name], ...data };
  _write(PLAYERS_KEY, players);
}

function deletePlayer(name) {
  const players = getAllPlayers();
  delete players[name];
  _write(PLAYERS_KEY, players);
  // Clean up game-specific data — match exact suffix pattern
  const suffix = '_' + name;
  try {
    Object.keys(localStorage).forEach(k => {

function getAge(player) {
  if (player.dob) {

    const birth = new Date(player.dob);
    let age = today.getFullYear() - birth.getFullYear();

    if (!oldPlayers || !oldPlayers.players) {
      localStorage.setItem('kidsgames_migrated_typetrainer', 'true');
      return;
    }

    // Migrate each player profile
    Object.entries(oldPlayers.players).forEach(([name, data]) => {
      if (!getPlayer(name)) {
        const theme = data.settings && data.settings.theme ? data.settings.theme : 'colourful-light';
        const themeMap = { 'light': 'colourful-light', 'dark': 'colourful-dark', 'clean-light': 'colourful-light', 'clean-dark': 'colourful-dark', 'colourful-light': 'colourful-light', 'colourful-dark': 'colourful-dark' };
        createPlayer(name, { dob: null, manualAge: bracketToAge(data.ageBracket) });
        savePlayer(name, { theme: themeMap[theme] || theme });
      }
      // Migrate game-specific data
      const key = STORAGE_PREFIX + 'typetrainer_' + name;
      _write(key, {
        highScore: data.highScore || 0,
        highestStage: data.highestStage || 0,
        totalGamesPlayed: data.totalGamesPlayed || 0,
        stats: data.stats || {},
        speedPreference: (data.settings && data.settings.speedPreference) || 1.8,
      });
    });

    // Set active player from old data
    const lastPlayer = localStorage.getItem('typingGame_lastPlayer');
    if (lastPlayer && getPlayer(lastPlayer)) {
      setActivePlayer(lastPlayer);
    }

    // Clean up old keys (only if migration succeeded)
    const newPlayers = getAllPlayers();
    if (Object.keys(newPlayers).length > 0) {
      localStorage.removeItem('players');
      localStorage.removeItem('currentPlayer');
      localStorage.removeItem('typingGame_theme');
      localStorage.removeItem('typingGame_lastPlayer');
    } else {
      console.error('KidsGames: migration wrote no players — keeping old keys as backup');
    }
    localStorage.setItem('kidsgames_migrated_typetrainer', 'true');
  }

  // --- Player selection ---
  function getPlayersDueForNudge(players) {
    return Object.values(players).filter(p => {
      if (getAge(p) === null) return false;
      // Don't show if dismissed less than 7 days ago
      const lastSeen = p.lastAgeNudgeSeen || '2000-01-01';
      const daysSinceSeen = (Date.now() - new Date(lastSeen).getTime()) / 86400000;
      if (daysSinceSeen < 7) return false;
      // Show if it's been at least a year since last nudge
      const lastNudge = p.lastAgeNudge || p.createdAt;
      const daysSinceNudge = (Date.now() - new Date(lastNudge).getTime()) / 86400000;
      return daysSinceNudge >= 365;
    });
  }

    // Games dropdown

      const dd = document.getElementById('kg-games-dropdown');

    document.getElementById('kg-addplayer-form').addEventListener('submit', (e) => {

      const name = document.getElementById('kg-name-input').value.trim();
      const dobInput = document.getElementById('kg-dob-input');

      const created = createPlayer(name, { dob, manualAge });
      if (created) {
        const player = getPlayer(created);

        _resetAddPlayerForm();

        document.getElementById('kg-dob-field').hidden = mode !== 'dob';
        document.getElementById('kg-age-field').hidden = mode !== 'age';
      });
    });

    // Enable submit when name is entered
    document.getElementById('kg-name-input').addEventListener('input', (e) => {
      document.getElementById('kg-addplayer-submit').disabled = !e.target.value.trim();
    });

    // Theme picker
    document.getElementById('kg-theme-btn').addEventListener('click', toggleThemeDropdown);
    document.getElementById('kg-theme-dropdown').addEventListener('click', (e) => {
      const option = e.target.closest('.kg-theme-option');
      if (!option) return;
      setTheme(option.dataset.theme);
      document.getElementById('kg-theme-dropdown').hidden = true;
      document.getElementById('kg-theme-btn').setAttribute('aria-expanded', 'false');
    });

    // Volume
    document.getElementById('kg-volume-btn').addEventListener('click', toggleMute);

    // Keyboard: Escape closes overlays/dropdowns, Tab traps focus in overlays
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const playerOverlay = document.getElementById('kg-player-overlay');
        const addOverlay = document.getElementById('kg-addplayer-overlay');
        const gamesDD = document.getElementById('kg-games-dropdown');
        const themeDD = document.getElementById('kg-theme-dropdown');

        if (!themeDD.hidden) {
          themeDD.hidden = true;
          document.getElementById('kg-theme-btn').setAttribute('aria-expanded', 'false');
          return;
        }
        if (!gamesDD.hidden) {
          gamesDD.hidden = true;
          document.getElementById('kg-games-btn').setAttribute('aria-expanded', 'false');
          return;
        }
        if (!addOverlay.hidden) { addOverlay.hidden = true; _cancelAgeUpdate(); showPlayerSelect(); return; }
        // Player overlay: only close if there's an active player (can't dismiss on first visit)
        if (!playerOverlay.hidden && getActivePlayer()) { playerOverlay.hidden = true; return; }
      }

      if (e.key === 'Tab') {
        const openOverlay = document.querySelector('.kg-overlay:not([hidden])');
        if (!openOverlay) return;
        const focusable = openOverlay.querySelectorAll('button:not([disabled]), input, select, textarea, a[href], [tabindex]:not([tabindex="-1"])');
        if (!focusable.length) return;
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault(); first.focus();
        }
      }
    });

    // Lock body scroll when overlay is open
    const scrollObserver = new MutationObserver(() => {
      const anyOpen = document.querySelector('.kg-overlay:not([hidden])');
      document.body.style.overflow = anyOpen ? 'hidden' : '';
    });
    document.querySelectorAll('.kg-overlay').forEach(o => {
      scrollObserver.observe(o, { attributes: true, attributeFilter: ['hidden'] });
    });

    // Close dropdowns on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.kg-shell__games-wrap')) {
        document.getElementById('kg-games-dropdown').hidden = true;
        document.getElementById('kg-games-btn').setAttribute('aria-expanded', 'false');
      }
      if (!e.target.closest('#kg-theme-btn') && !e.target.closest('.kg-theme-dropdown')) {
        document.getElementById('kg-theme-dropdown').hidden = true;
        document.getElementById('kg-theme-btn').setAttribute('aria-expanded', 'false');
      }
    });

    // OS colour scheme: auto-switch theme when no player is logged in
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      // Only auto-switch if no player has explicitly chosen a theme
      if (getActivePlayer()) return;
      const theme = e.matches ? 'colourful-dark' : 'colourful-light';
      document.documentElement.setAttribute('data-theme', theme);
    });
  }

  // --- Init on DOM ready ---
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initShell);
  } else {
    initShell();
  }

// --- questions.js ---
// questions.js — Number generation and question assembly

/**
 * Generate a single question.
 * @param {string} op  '+' | '-' | '*' | '/' | 'mixed'
 * @param {object} settings  { min, max, maxTable, negatives, decimals }
 * @returns {{ left, op, right, result, blank: 'left'|'right', answer }}
 */
function generateQuestion(op, settings) {
  const { min, max, maxTable, negatives, decimals } = settings;
  const resolvedOp = op === 'mixed'
    ? ['+', '-', '*', '/'][Math.floor(Math.random() * 4)]
    : op;

  let left, right, result;

  switch (resolvedOp) {
    case '+': {
      left = randInt(min, max);
      right = randInt(min, max);
      if (decimals) {
        left = round1dp(left + randInt(0, 9) / 10);
        right = round1dp(right + randInt(0, 9) / 10);
      }
      result = round1dp(left + right);
      break;
    }
    case '-': {
      if (negatives) {
        left = randInt(min, max);
        right = randInt(min, max);
      } else {
        const a = randInt(min, max);
        const b = randInt(min, max);
        left = Math.max(a, b);
        right = Math.min(a, b);
      }
      if (decimals) {
        left = round1dp(left + randInt(0, 9) / 10);
        right = round1dp(right + randInt(0, 9) / 10);
        if (!negatives && left < right) [left, right] = [right, left];
      }
      result = round1dp(left - right);
      break;
    }
    case '*': {
      left = randInt(1, maxTable);
      right = randInt(1, maxTable);
      result = left * right;
      break;
    }
    case '/': {
      // Always generates a clean integer result
      right = randInt(1, maxTable);       // divisor (never 0)
      result = randInt(1, maxTable);      // quotient
      left = right * result;              // dividend
      break;
    }
    default:
      throw new Error(`Unknown op: ${resolvedOp}`);
  }

  const blank = Math.random() < 0.5 ? 'left' : 'right';
  const answer = blank === 'left' ? left : right;

  return { left, op: resolvedOp, right, result, blank, answer };
}

/**
 * Generate wrong answer choices.
 * @param {number} answer  The correct answer
 * @param {string} op  The operation ('+' | '-' | '*' | '/')
 * @param {object} settings  { min, max, maxTable, negatives, decimals }
 * @param {number} count  Number of distractors to return (default 3)
 * @returns {number[]}
 */
function generateDistractors(answer, op, settings, count = 3) {
  const { negatives, decimals } = settings;
  const candidates = new Set();
  let attempts = 0;

  while (candidates.size < count && attempts < 200) {
    attempts++;
    let candidate;

    if (op === '*' || op === '/') {
      // Use an adjacent multiple — stays in the same ballpark as the correct answer
      const step = randInt(1, Math.max(2, Math.floor(settings.maxTable / 3)));
      candidate = answer + step * (Math.random() < 0.5 ? 1 : -1);
    } else {
      // Offset by a small amount
      const offset = randInt(1, 5) * (Math.random() < 0.5 ? 1 : -1);
      candidate = answer + offset;
    }

    if (decimals) candidate = round1dp(candidate);
    else candidate = Math.round(candidate);

    if (candidate === answer) continue;
    if (!negatives && candidate < 0) continue;
    if (candidates.has(candidate)) continue;

    candidates.add(candidate);
  }

  // Fallback: if we couldn't generate enough, use sequential offsets
  let fallback = 1;
  while (candidates.size < count) {
    const c = answer + fallback;
    if (c !== answer && !candidates.has(c)) candidates.add(c);
    fallback++;
  }

  return [...candidates];
}

// --- Helpers ---

function randInt(min, max) {
  if (min > max) [min, max] = [max, min];
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function round1dp(n) {
  return Math.round(n * 10) / 10;
}

// --- game.js ---
// game.js — GameSession: manages one play session

const SPRINT_DURATION = 60;
const ROUND_QUESTIONS = 10;
const POINTS_CORRECT = 10;
const STREAK_BONUS = 2;
const ANSWER_PAUSE_MS = 600; // ms to show correct/wrong before next question

class GameSession {
  constructor({ op, mode, range, onQuestion, onAnswer, onScore, onEnd }) {
    this.op = op;
    this.mode = mode;
    this.range = range;
    this.onQuestion = onQuestion;
    this.onAnswer = onAnswer;   // ({ correct, correctAnswer, chosen }) — UI shows feedback
    this.onScore = onScore;
    this.onEnd = onEnd;

    this.score = 0;
    this.streak = 0;
    this.bestStreak = 0;
    this.correct = 0;
    this.total = 0;
    this.questionNum = 0;
    this.timeLeft = SPRINT_DURATION;
    this.startTime = null;
    this._timer = null;
    this._active = false;
    this._currentQuestion = null;
    this._answerLocked = false;
  }

  start() {
    this._active = true;
    this.startTime = Date.now();
    if (this.mode === 'sprint') {
      this._startTimer();
    }
    this._nextQuestion();
  }

  answer(value) {
    if (!this._active || this._answerLocked) return;
    this._answerLocked = true;

    const q = this._currentQuestion;
    const isCorrect = value === q.answer;
    this.total++;

    if (isCorrect) {
      this.correct++;
      this.streak++;
      if (this.streak > this.bestStreak) this.bestStreak = this.streak;
      this.score += POINTS_CORRECT + (this.streak - 1) * STREAK_BONUS;
    } else {
      this.streak = 0;
    }

    // Notify UI to show answer feedback — game.js does NOT touch the DOM
    this.onAnswer({ correct: isCorrect, correctAnswer: q.answer, chosen: value });
    this.onScore(this._hudState());

    setTimeout(() => {
      if (!this._active) return;
      this._answerLocked = false;
      if (this.mode === 'round' && this.questionNum >= ROUND_QUESTIONS) {
        this.end();
      } else {
        this._nextQuestion();
      }
    }, ANSWER_PAUSE_MS);
  }

  end() {
    if (!this._active) return;
    this._active = false;
    clearInterval(this._timer);
    const timeTaken = this.mode !== 'endless'
      ? Math.round((Date.now() - this.startTime) / 1000)
      : null;
    this.onEnd({
      score: this.score,
      accuracy: this.total > 0 ? Math.round((this.correct / this.total) * 100) : 0,
      bestStreak: this.bestStreak,
      timeTaken,
    });
  }

  _nextQuestion() {
    this.questionNum++;
    const q = generateQuestion(this.op, this.range);
    this._currentQuestion = q;
    const distractors = generateDistractors(q.answer, q.op, this.range);
    const choices = shuffle([q.answer, ...distractors]);
    this.onQuestion(q, choices);
    this.onScore(this._hudState());
  }

  _hudState() {
    return {
      score: this.score,
      mode: this.mode,
      timeLeft: this.timeLeft,
      questionNum: this.questionNum,
      totalQuestions: ROUND_QUESTIONS,
    };
  }

  _startTimer() {
    this._timer = setInterval(() => {
      this.timeLeft--;
      this.onScore(this._hudState());
      if (this.timeLeft <= 0) {
        clearInterval(this._timer);
        this.end();
      }
    }, 1000);
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// --- Settings state ---
let settings = {
  op: '+',
  difficulty: 'medium',
  mode: 'sprint',
  custom: { min: 1, max: 100, maxTable: 12, negatives: false, decimals: false }
};

const DIFFICULTY_PRESETS = {
  easy:   { min: 1, max: 10,  maxTable: 5,  negatives: false, decimals: false, hint: 'Numbers 1–10, tables to 5' },
  medium: { min: 1, max: 20,  maxTable: 10, negatives: false, decimals: false, hint: 'Numbers 1–20, tables to 10' },
  hard:   { min: 1, max: 100, maxTable: 12, negatives: false, decimals: false, hint: 'Numbers 1–100, tables to 12' },
  custom: { hint: 'Your own settings' },
};

// --- DOM refs ---
const screens = {
  settings: document.getElementById('nb-settings'),
  game:     document.getElementById('nb-game'),
  results:  document.getElementById('nb-results'),
};

// --- Boot ---
loadSettings();
initSettingsScreen();
showScreen('settings');

// --- Initialise settings screen ---
function initSettingsScreen() {
  // Operation toggles
  document.getElementById('nb-op-row').addEventListener('click', e => {
    const btn = e.target.closest('[data-op]');
    if (!btn) return;
    settings.op = btn.dataset.op;
    updateToggles('nb-op-row', 'data-op', settings.op);
  });

  // Difficulty toggles
  document.getElementById('nb-diff-row').addEventListener('click', e => {
    const btn = e.target.closest('[data-diff]');
    if (!btn) return;
    settings.difficulty = btn.dataset.diff;
    updateToggles('nb-diff-row', 'data-diff', settings.difficulty);
    updateDifficultyHint();
    document.getElementById('nb-custom-opts').hidden = settings.difficulty !== 'custom';
  });

  // Mode buttons
  document.getElementById('nb-mode-row').addEventListener('click', e => {
    const btn = e.target.closest('[data-mode]');
    if (!btn) return;
    settings.mode = btn.dataset.mode;
    updateModeButtons();
  });

  // Custom inputs
  document.getElementById('nb-min').addEventListener('change', e => {
    settings.custom.min = Number(e.target.value);
  });
  document.getElementById('nb-max').addEventListener('change', e => {
    settings.custom.max = Number(e.target.value);
  });
  document.getElementById('nb-table').addEventListener('change', e => {
    settings.custom.maxTable = Number(e.target.value);
  });
  document.getElementById('nb-negatives').addEventListener('change', e => {
    settings.custom.negatives = e.target.checked;
  });
  document.getElementById('nb-decimals').addEventListener('change', e => {
    settings.custom.decimals = e.target.checked;
  });

  // Start button
  document.getElementById('nb-start-btn').addEventListener('click', startGame);

  // Restore saved settings into UI
  applySettingsToUI();
}

function updateToggles(rowId, attr, activeVal) {
  document.getElementById(rowId).querySelectorAll(`[${attr}]`).forEach(btn => {
    const active = btn.dataset[attr.replace('data-', '')] === activeVal;
    btn.classList.toggle('nb-toggle--active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
}

function updateModeButtons() {
  document.getElementById('nb-mode-row').querySelectorAll('[data-mode]').forEach(btn => {
    const active = btn.dataset.mode === settings.mode;
    btn.classList.toggle('nb-mode-btn--active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
}

function updateDifficultyHint() {
  const preset = DIFFICULTY_PRESETS[settings.difficulty];
  document.getElementById('nb-diff-hint').textContent = preset.hint;
}

function applySettingsToUI() {
  updateToggles('nb-op-row', 'data-op', settings.op);
  updateToggles('nb-diff-row', 'data-diff', settings.difficulty);
  updateModeButtons();
  updateDifficultyHint();
  document.getElementById('nb-custom-opts').hidden = settings.difficulty !== 'custom';
  document.getElementById('nb-min').value = settings.custom.min;
  document.getElementById('nb-max').value = settings.custom.max;
  document.getElementById('nb-table').value = settings.custom.maxTable;
  document.getElementById('nb-negatives').checked = settings.custom.negatives;
  document.getElementById('nb-decimals').checked = settings.custom.decimals;
}

function getActiveRange() {
  if (settings.difficulty === 'custom') return settings.custom;
  const p = DIFFICULTY_PRESETS[settings.difficulty];
  return { min: p.min, max: p.max, maxTable: p.maxTable, negatives: p.negatives, decimals: p.decimals };
}

// --- Screen management ---
function showScreen(name) {
  Object.keys(screens).forEach(k => screens[k].hidden = k !== name);
}

// --- Persistence ---
function saveSettings() {
  try {
    if (window.KidsGames) {
      const d = window.KidsGames.loadGameData('numberbonds') || {};
      window.KidsGames.saveGameData('numberbonds', { ...d, settings });
    } else {
      localStorage.setItem('nb_settings', JSON.stringify(settings));
    }
  } catch (e) { /* ignore */ }
}

function loadSettings() {
  try {
    let saved;
    if (window.KidsGames) {
      const d = window.KidsGames.loadGameData('numberbonds');
      saved = d?.settings;
    } else {
      const raw = localStorage.getItem('nb_settings');
      saved = raw ? JSON.parse(raw) : null;
    }
    if (saved) {
      settings = { ...settings, ...saved };
    }
  } catch (e) { /* ignore */ }
  applyAgeBracketDefault();
}

function applyAgeBracketDefault() {
  // Only if no settings have been saved yet
  try {
    const existing = window.KidsGames?.loadGameData('numberbonds');
    if (existing?.settings?.difficulty) return; // already set
    const bracket = window.KidsGames?.player?.ageBracket;
    if (bracket === '4-5') settings.difficulty = 'easy';
    else if (bracket === '9-12') settings.difficulty = 'hard';
    else settings.difficulty = 'medium';
  } catch (e) { /* ignore */ }
}

// --- Game start ---
let activeSession = null;

function startGame() {
  saveSettings();
  const range = getActiveRange();
  activeSession = new GameSession({
    op: settings.op,
    mode: settings.mode,
    range,
    onQuestion: renderQuestion,
    onAnswer: renderAnswerFeedback,
    onScore: renderHud,
    onEnd: showResults,
  });
  showScreen('game');
  initGameScreen();
  activeSession.start();
}

function initGameScreen() {
  document.getElementById('nb-quit-btn').onclick = () => {
    activeSession?.end();
  };
}

// --- Question rendering ---
function renderQuestion(question, choiceNums) {
  // Render equation with blank
  const { left, op, right, result, blank } = question;
  const opStr = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] ?? op;
  const safeLeft = Number(left);
  const safeRight = Number(right);
  const safeResult = Number(result);
  let html;
  if (blank === 'left') {
    html = `<span class="nb-blank">?</span> ${opStr} ${safeRight} = ${safeResult}`;
  } else {
    html = `${safeLeft} ${opStr} <span class="nb-blank">?</span> = ${safeResult}`;
  }
  const hasLargeNum = [safeLeft, safeRight, safeResult].some(n => Math.abs(n) >= 100);
  const qEl = document.getElementById('nb-question');
  qEl.innerHTML = html;
  // Shrink font if any number has 3+ digits (custom large ranges)
  qEl.classList.toggle('nb-question--long', hasLargeNum);

  // Render choice buttons
  const choicesEl = document.getElementById('nb-choices');
  choicesEl.innerHTML = '';
  choiceNums.forEach(num => {
    const btn = document.createElement('button');
    btn.className = 'nb-choice';
    btn.textContent = num;
    btn.setAttribute('aria-label', `Answer: ${num}`);
    btn.addEventListener('click', () => activeSession?.answer(num));
    choicesEl.appendChild(btn);
  });
}

function renderAnswerFeedback({ correct, correctAnswer, chosen }) {
  document.getElementById('nb-choices')?.querySelectorAll('.nb-choice').forEach(btn => {
    btn.disabled = true;
    const num = Number(btn.textContent);
    if (num === correctAnswer) btn.classList.add('nb-choice--reveal');
    if (num === chosen && !correct) btn.classList.add('nb-choice--wrong');
    if (num === chosen && correct) btn.classList.add('nb-choice--correct');
  });
}

function renderHud(hudState) {
  document.getElementById('nb-score').textContent = hudState.score;
  const center = document.getElementById('nb-hud-center');
  if (hudState.mode === 'sprint') {
    center.textContent = `⏱ ${hudState.timeLeft}s`;
  } else if (hudState.mode === 'round') {
    center.textContent = `${hudState.questionNum} / ${hudState.totalQuestions}`;
  } else {
    center.textContent = '';
  }
}

// --- Results rendering ---
function showResults(stats) {
  // Use accuracy % so thresholds work consistently across all modes and score ranges
  document.getElementById('nb-results-icon').textContent = stats.accuracy >= 80 ? '🏆' : stats.accuracy >= 50 ? '⭐' : '💪';
  document.getElementById('nb-results-title').textContent =
    stats.accuracy >= 80 ? 'Amazing!' : stats.accuracy >= 50 ? 'Well done!' : 'Keep practising!';

  const isBest = savePersonalBest(stats);

  const statsEl = document.getElementById('nb-stats');
  statsEl.innerHTML = `
    <div class="nb-stat-row">
      <span class="nb-stat-label">Score</span>
      <span class="nb-stat-value${isBest ? ' nb-stat-value--best' : ''}">${stats.score}${isBest ? ' ★' : ''}</span>
    </div>
    <div class="nb-stat-row">
      <span class="nb-stat-label">Accuracy</span>
      <span class="nb-stat-value">${stats.accuracy}%</span>
    </div>
    <div class="nb-stat-row">
      <span class="nb-stat-label">Best streak</span>
      <span class="nb-stat-value">${stats.bestStreak}</span>
    </div>
    ${stats.timeTaken ? `<div class="nb-stat-row">
      <span class="nb-stat-label">Time</span>
      <span class="nb-stat-value">${stats.timeTaken}s</span>
    </div>` : ''}
  `;

  document.getElementById('nb-play-again-btn').onclick = startGame;
  document.getElementById('nb-change-settings-btn').onclick = () => showScreen('settings');
  showScreen('results');
}

function savePersonalBest(stats) {
  const key = `pb_${settings.op}_${settings.difficulty}_${settings.mode}`;
  try {
    let current;
    if (window.KidsGames) {
      const store = window.KidsGames.loadGameData('numberbonds') || {};
      current = store[key] || 0;
      if (stats.score > current) {
        window.KidsGames.saveGameData('numberbonds', { ...store, [key]: stats.score });
        return true;
      }
    } else {
      current = Number(localStorage.getItem(`nb_${key}`)) || 0;
      if (stats.score > current) {
        localStorage.setItem(`nb_${key}`, stats.score);
        return true;
      }
    }
  } catch (e) { /* ignore */ }
  return false;
}

// --- Shell player change ---
if (window.KidsGames) {
  window.KidsGames.onPlayerChange(() => {
    loadSettings();
    applySettingsToUI();
  });
}

  </script>
</body>
